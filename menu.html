<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Puppy Games!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      background: linear-gradient(160deg, #ffd6e8, #d6f0ff, #ffefc4, #e0ffd6);
      background-size: 400% 400%;
      animation: bg-breathe 10s ease-in-out infinite alternate;
      min-height: 100vh;
      padding: 24px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }
    @keyframes bg-breathe {
      0%   { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* ── Floating background sparkles ── */
    .bg-deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.28;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.28; }
      92%  { opacity: 0.28; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ── Header ── */
    h1 {
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      background: linear-gradient(90deg, #ff6b6b, #ff922b, #ffd43b, #51cf66, #339af0, #cc5de8, #ff6b6b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow-move 3s linear infinite;
      text-align: center;
      position: relative;
      z-index: 1;
      filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.06));
      letter-spacing: 1px;
    }
    @keyframes rainbow-move { to { background-position: 200% center; } }

    .tagline {
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.3rem);
      color: #cc5de8;
      margin: 4px 0 28px;
      animation: wiggle 2.5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-1deg); }
      50%     { transform: rotate(1deg); }
    }

    /* ── Vertical stack ── */
    .game-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .game-card {
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      border: 5px solid;
      box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 14px 28px rgba(0,0,0,0.08);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--tint);
      opacity: 0.25;
      pointer-events: none;
    }

    .game-card:hover {
      transform: translateY(-6px) rotate(-1deg);
      box-shadow: 0 14px 0 rgba(0,0,0,0.08), 0 20px 40px rgba(0,0,0,0.12);
    }
    .game-card:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.08);
    }

    /* Per-card theme */
    .game-card.word     { border-color: #ffb3c6; --tint: linear-gradient(135deg, #fff0f6, #fff); }
    .game-card.princess { border-color: #c5b3ff; --tint: linear-gradient(135deg, #f3e9ff, #fff); }
    .game-card.memory   { border-color: #ffe08a; --tint: linear-gradient(135deg, #fff9db, #fff); }

    .game-emoji {
      font-size: clamp(3.2rem, 10vw, 4.5rem);
      flex-shrink: 0;
      width: clamp(80px, 20vw, 100px);
      height: clamp(80px, 20vw, 100px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: bob 2.4s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0)   rotate(-4deg); }
      50%     { transform: translateY(-7px) rotate(4deg); }
    }

    .game-card.word     .game-emoji { background: linear-gradient(135deg, #ffd6e8, #ffb3c6); }
    .game-card.princess .game-emoji { background: linear-gradient(135deg, #e9dcff, #c5b3ff); }
    .game-card.memory   .game-emoji { background: linear-gradient(135deg, #fff4c2, #ffe08a); }

    .game-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .game-title {
      font-size: clamp(1.2rem, 3.8vw, 1.55rem);
      margin-bottom: 4px;
      line-height: 1.15;
      letter-spacing: 0.5px;
    }
    .game-card.word     .game-title { color: #d63384; }
    .game-card.princess .game-title { color: #7048d4; }
    .game-card.memory   .game-title { color: #b8860b; }

    .game-desc {
      color: #666;
      font-family: 'Comic Sans MS', cursive;
      font-size: clamp(0.82rem, 2.3vw, 0.95rem);
      line-height: 1.35;
    }

    .play-arrow {
      font-size: 2rem;
      flex-shrink: 0;
      animation: nudge 1.3s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes nudge {
      0%,100% { transform: translateX(0); }
      50%     { transform: translateX(6px); }
    }
    .game-card.word     .play-arrow { color: #d63384; }
    .game-card.princess .play-arrow { color: #7048d4; }
    .game-card.memory   .play-arrow { color: #b8860b; }

    /* Stagger the entrance animation so the cards pop in one after another */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }
    .game-card { animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .game-card:nth-child(1) { animation-delay: 0.05s; }
    .game-card:nth-child(2) { animation-delay: 0.18s; }
    .game-card:nth-child(3) { animation-delay: 0.31s; }
  </style>
</head>
<body>

<script>
  /* Floating background decorations */
  const decos = ['⭐','🌟','✨','💫','🌸','🍭','🎀','🌈','💕','🦋','🐾','🎮'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('span');
    el.className = 'bg-deco';
    el.textContent = decos[Math.floor(Math.random() * decos.length)];
    el.style.left              = Math.random() * 100 + 'vw';
    el.style.fontSize          = (1.1 + Math.random() * 1.6) + 'rem';
    el.style.animationDuration = (14 + Math.random() * 16) + 's';
    el.style.animationDelay    = (Math.random() * 14) + 's';
    document.body.appendChild(el);
  }
</script>

<h1>🎮 Happy Puppy Games 🐶</h1>
<div class="tagline">Pick a game, little star! ✨</div>

<div class="game-stack">

  <div class="game-card word" onclick="window.location.href='word-adventure.html'">
    <div class="game-emoji">🌟</div>
    <div class="game-info">
      <div class="game-title">Word Adventure</div>
      <div class="game-desc">Match emojis to words and become a reading superstar!</div>
    </div>
    <div class="play-arrow">▶</div>
  </div>

  <div class="game-card princess" onclick="window.location.href='princess.html'">
    <div class="game-emoji">👑</div>
    <div class="game-info">
      <div class="game-title">Princess Memory</div>
      <div class="game-desc">Find the matching princesses in this royal memory game.</div>
    </div>
    <div class="play-arrow">▶</div>
  </div>

  <div class="game-card memory" onclick="window.location.href='emoji-word-match.html'">
    <div class="game-emoji">🧠</div>
    <div class="game-info">
      <div class="game-title">Emoji &amp; Word Match</div>
      <div class="game-desc">Flip a picture, then flip the word that goes with it!</div>
    </div>
    <div class="play-arrow">▶</div>
  </div>

</div>

</body>
</html>
