<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Travel Packing List</title>
<style>
  :root {
    --bg: #fdf9f3;
    --card: #ffffff;
    --ink: #2b2233;
    --muted: #7a6f80;
    --border: #ece4d9;
    --accent: #ff7a59;
    --accent-soft: #ffe7df;
    --today: #fff4ec;
    --shadow: 0 8px 24px rgba(40, 30, 50, 0.06);
    --green: #10b981;
    --blue: #3b82f6;
    --yellow: #eab308;
    --pink: #ec4899;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-rounded, "Nunito", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }
  header {
    padding: 28px 20px 12px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  .form-card {
    background: var(--card);
    padding: 24px;
    border-radius: 16px;
    box-shadow: var(--shadow);
    margin: 20px 0;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  label {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--ink);
  }

  input[type="text"],
  input[type="date"] {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font: inherit;
    font-size: 15px;
    transition: border-color 0.15s;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn {
    border: 0;
    background: var(--accent);
    color: white;
    font: inherit;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(255, 122, 89, 0.3);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255, 122, 89, 0.4);
  }

  .btn:active {
    transform: translateY(0);
  }

  .trip-info {
    background: var(--today);
    padding: 20px;
    border-radius: 12px;
    margin: 20px 0;
    display: none;
  }

  .trip-info.show {
    display: block;
  }

  .trip-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .trip-title {
    font-size: 20px;
    font-weight: 700;
  }

  .weather-info {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .temp {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .weather-desc {
    font-size: 14px;
    color: var(--muted);
  }

  .packing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 24px;
  }

  .category-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }

  .category-icon {
    font-size: 24px;
  }

  .category-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
  }

  .item-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .item:last-child {
    border-bottom: none;
  }

  .item:hover {
    background: var(--today);
    margin: 0 -8px;
    padding-left: 8px;
    padding-right: 8px;
    border-radius: 8px;
  }

  .checkbox {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--accent);
  }

  .item-label {
    flex: 1;
    cursor: pointer;
    user-select: none;
  }

  .item.checked .item-label {
    text-decoration: line-through;
    color: var(--muted);
  }

  .person-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .person-tag.mom {
    background: #c4b5fd;
    color: white;
  }

  .person-tag.toddler {
    background: #ec4899;
    color: white;
  }

  .person-tag.both {
    background: var(--accent);
    color: white;
  }

  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.3s;
    border-radius: 999px;
  }

  .progress-text {
    text-align: center;
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-secondary {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    box-shadow: var(--shadow);
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .spinner {
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media print {
    body {
      background: white;
    }
    .form-card,
    .actions {
      display: none;
    }
    .category-card {
      break-inside: avoid;
      box-shadow: none;
      border: 1px solid var(--border);
    }
  }
</style>
</head>

<header>

</header>

        </div>
        <div class="form-group">

        </div>
        <div class="form-group">

          <input type="date" id="endDate" required />
        </div>
      </div>
      <button type="submit" class="btn">Generate Packing List</button>
    </form>
  </div>

  <div id="loading" class="loading" style="display: none;">

    <p>Checking weather and building your packing list...</p>
  </div>

  <div id="tripInfo" class="trip-info">
    <div class="trip-header">
      <div>
        <div class="trip-title" id="tripTitle"></div>
        <div class="weather-desc" id="tripDates"></div>
      </div>
      <div class="weather-info">
        <div class="temp" id="temperature"></div>
        <div>

          <div class="weather-desc" id="weatherCondition"></div>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0 of 0 items packed</div>
  </div>

  <div id="packingList" class="packing-grid"></div>

  <div class="actions" id="actions" style="display: none;">
    <button class="btn btn-secondary" onclick="window.print()">🖨️ Print List</button>
    <button class="btn btn-secondary" onclick="resetList()">🔄 Start Over</button>
    <button class="btn" onclick="shareList()">📤 Share List</button>
  </div>
</div>

// Set min date to today
document.getElementById('startDate').min = new Date().toISOString().split('T')[0];
document.getElementById('endDate').min = new Date().toISOString().split('T')[0];

// Update end date min when start date changes
document.getElementById('startDate').addEventListener('change', function() {
  document.getElementById('endDate').min = this.value;
});

document.getElementById('tripForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const destination = document.getElementById('destination').value;
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('tripInfo').classList.remove('show');
  document.getElementById('packingList').innerHTML = '';
  document.getElementById('actions').style.display = 'none';

  try {
    // Get weather data
    const weather = await getWeather(destination, startDate, endDate);

    tripData = {
      destination,
      startDate: new Date(startDate),
      endDate: new Date(endDate),
      weather
    };

    displayTripInfo();
    generatePackingList();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('actions').style.display = 'flex';

  } catch (error) {
    console.error('Error:', error);
    document.getElementById('loading').innerHTML = '<p>Error loading weather data. Using default packing list.</p>';

    // Fallback to default list
    tripData = {
      destination,
      startDate: new Date(startDate),
      endDate: new Date(endDate),
      weather: { avgTemp: 70, condition: 'mild', precipitation: false }
    };

    setTimeout(() => {
      displayTripInfo();
      generatePackingList();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('actions').style.display = 'flex';
    }, 1000);
  }
});

async function getWeather(city, startDate, endDate) {
  // Using Open-Meteo API (free, no API key needed)
  try {
    // First, geocode the city
    const geoResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const geoData = await geoResponse.json();

    if (!geoData.results || geoData.results.length === 0) {
      throw new Error('City not found');
    }

    const { latitude, longitude, name, country } = geoData.results[0];

    // Get weather forecast
    const weatherResponse = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&temperature_unit=fahrenheit&timezone=auto&start_date=${startDate}&end_date=${endDate}`
    );
    const weatherData = await weatherResponse.json();

    // Calculate averages
    const temps = weatherData.daily.temperature_2m_max;
    const avgTemp = Math.round(temps.reduce((a, b) => a + b, 0) / temps.length);
    const maxTemp = Math.max(...temps);
    const minTemp = Math.min(...weatherData.daily.temperature_2m_min);

    const precipitation = weatherData.daily.precipitation_sum.some(p => p > 0);

    // Determine condition
    let condition = 'mild';
    if (avgTemp < 50) condition = 'cold';
    else if (avgTemp > 75) condition = 'warm';

    // Get weather description from code
    const weatherCode = weatherData.daily.weathercode[0];
    const weatherDesc = getWeatherDescription(weatherCode);

    return {
      city: `${name}, ${country}`,
      avgTemp,
      maxTemp,
      minTemp,
      condition,
      precipitation,
      description: weatherDesc
    };

  } catch (error) {
    console.error('Weather fetch error:', error);
    // Return default moderate weather
    return {
      city: city,
      avgTemp: 70,
      maxTemp: 75,
      minTemp: 65,
      condition: 'mild',
      precipitation: false,
      description: 'Partly cloudy'
    };
  }
}

function getWeatherDescription(code) {
  const weatherCodes = {
    0: 'Clear sky',
    1: 'Mainly clear',
    2: 'Partly cloudy',
    3: 'Overcast',
    45: 'Foggy',
    48: 'Foggy',
    51: 'Light drizzle',
    53: 'Drizzle',
    55: 'Heavy drizzle',
    61: 'Light rain',
    63: 'Rain',
    65: 'Heavy rain',
    71: 'Light snow',
    73: 'Snow',
    75: 'Heavy snow',
    80: 'Light showers',
    81: 'Showers',
    82: 'Heavy showers',
    95: 'Thunderstorm',
    96: 'Thunderstorm with hail'
  };
  return weatherCodes[code] || 'Variable conditions';
}

function displayTripInfo() {
  const { destination, startDate, endDate, weather } = tripData;

  const nights = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
  const dateFormat = { month: 'short', day: 'numeric', year: 'numeric' };

  document.getElementById('tripTitle').textContent = `Trip to ${weather.city || destination}`;
  document.getElementById('tripDates').textContent =
    `${startDate.toLocaleDateString('en-US', dateFormat)} - ${endDate.toLocaleDateString('en-US', dateFormat)} (${nights} nights)`;

  document.getElementById('temperature').textContent = `${weather.avgTemp}°F`;
  document.getElementById('weatherDesc').textContent = weather.description;
  document.getElementById('weatherCondition').textContent =
    `${weather.minTemp}° - ${weather.maxTemp}°F${weather.precipitation ? ' • Rain expected' : ''}`;

  document.getElementById('tripInfo').classList.add('show');
}

function generatePackingList() {
  const container = document.getElementById('packingList');
  container.innerHTML = '';

  const { startDate, endDate, weather } = tripData;
  const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
  const nights = days;

  Object.keys(PACKING_ITEMS).forEach(categoryKey => {
    const category = PACKING_ITEMS[categoryKey];
    const card = document.createElement('div');
    card.className = 'category-card';

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <span class="category-icon">${category.icon}</span>
      <h3 class="category-title">${category.title}</h3>
    `;
    card.appendChild(header);

    const list = document.createElement('ul');
    list.className = 'item-list';

    category.items.forEach((item, index) => {
      // Filter by weather
      if (item.weather && item.weather !== weather.condition) {
        if (item.weather === 'rain' && !weather.precipitation) return;
        if (item.weather === 'warm' && weather.avgTemp < 70) return;
        if (item.weather === 'cold' && weather.avgTemp > 55) return;
        if (item.weather === 'mild' && (weather.avgTemp < 50 || weather.avgTemp > 80)) return;
      }

      let itemName = item.name;

      // Add quantity hints
      if (item.quantity === 'days+2') itemName += ` (${days + 2})`;
      else if (item.quantity === 'days+1') itemName += ` (${days + 1})`;
      else if (item.quantity === 'days+3') itemName += ` (${days + 3})`;
      else if (item.quantity === 'nights+3') itemName += ` (${nights + 3})`;
      else if (item.quantity === 'weather') itemName += ` (${days})`;
      else if (item.quantity && typeof item.quantity === 'number') itemName += ` (${item.quantity})`;

      const itemId = `${categoryKey}-${index}`;
      const isChecked = checkedItems.has(itemId);

      const li = document.createElement('li');
      li.className = `item ${isChecked ? 'checked' : ''}`;
      li.innerHTML = `
        <input type="checkbox" class="checkbox" id="${itemId}" ${isChecked ? 'checked' : ''} />
        <label class="item-label" for="${itemId}">${itemName}</label>
        <span class="person-tag ${item.person}">${item.person}</span>
      `;

      li.querySelector('.checkbox').addEventListener('change', function() {
        if (this.checked) {
          checkedItems.add(itemId);
          li.classList.add('checked');
        } else {
          checkedItems.delete(itemId);
          li.classList.remove('checked');
        }
        updateProgress();
        saveProgress();
      });

      list.appendChild(li);
    });

    card.appendChild(list);
    container.appendChild(card);
  });

  updateProgress();
  loadProgress();
}

function updateProgress() {
  const totalCheckboxes = document.querySelectorAll('.checkbox').length;
  const checkedCheckboxes = checkedItems.size;
  const percentage = totalCheckboxes > 0 ? (checkedCheckboxes / totalCheckboxes) * 100 : 0;

  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('progressText').textContent =
    `${checkedCheckboxes} of ${totalCheckboxes} items packed (${Math.round(percentage)}%)`;
}

function saveProgress() {
  const data = {
    tripData,
    checkedItems: Array.from(checkedItems)
  };
  localStorage.setItem('packingListProgress', JSON.stringify(data));
}

function loadProgress() {
  const saved = localStorage.getItem('packingListProgress');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      checkedItems = new Set(data.checkedItems);

      data.checkedItems.forEach(id => {
        const checkbox = document.getElementById(id);
        if (checkbox) {
          checkbox.checked = true;
          checkbox.closest('.item').classList.add('checked');
        }
      });

      updateProgress();
    } catch (e) {
      console.error('Error loading progress:', e);
    }
  }
}

function resetList() {
  if (confirm('Are you sure you want to start over? This will clear your current list and progress.')) {
    checkedItems.clear();
    tripData = null;
    localStorage.removeItem('packingListProgress');

    document.getElementById('tripInfo').classList.remove('show');
    document.getElementById('packingList').innerHTML = '';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('tripForm').reset();
  }
}

function shareList() {
  const { destination, startDate, endDate } = tripData;
  const checkedCount = checkedItems.size;
  const totalCount = document.querySelectorAll('.checkbox').length;

  const text = `Packing for ${destination}!\n${startDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}\n${checkedCount}/${totalCount} items packed so far!`;

  if (navigator.share) {
    navigator.share({
      title: 'Travel Packing List',
      text: text,
      url: window.location.href
    });
  } else {
    // Fallback - copy to clipboard
    navigator.clipboard.writeText(text).then(() => {
      alert('List details copied to clipboard!');
    });
  }
}

// Auto-save on page unload
window.addEventListener('beforeunload', saveProgress);
</script>
