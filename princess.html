<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Princess Memory Match!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      color: #880e4f;
      padding: 18px 10px 4px;
      text-shadow: 3px 3px 0 #f8bbd0;
      letter-spacing: 2px;
    }

    /* sparkle stars in header */
    h1::before { content: '✨ '; }
    h1::after  { content: ' ✨'; }

    /* ── Mode picker ── */
    #mode-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px 20px;
    }

    #mode-screen p {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: #6a1b9a;
      text-align: center;
    }

    .mode-btn {
      font-family: inherit;
      font-size: clamp(1.1rem, 3.5vw, 1.8rem);
      padding: 18px 44px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 7px 0 rgba(0,0,0,0.22);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      width: clamp(240px, 60vw, 340px);
      text-align: center;
    }
    .mode-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.22); }
    .mode-btn.easy { background: linear-gradient(135deg, #f06292, #c2185b); }
    .mode-btn.hard { background: linear-gradient(135deg, #ab47bc, #6a1b9a); }
    .mode-btn small { display: block; font-size: 0.55em; opacity: 0.9; margin-top: 2px; }

    /* ── Game ── */
    #game-screen { display: none; }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px 10px;
      flex-wrap: wrap;
      gap: 8px;
    }

    #score-box {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      color: #6a1b9a;
      font-weight: bold;
    }

    #back-btn, #restart-btn {
      font-family: inherit;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      padding: 8px 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #back-btn:active, #restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
    #back-btn    { background: #fce4ec; color: #c2185b; }
    #restart-btn { background: #f3e5f5; color: #6a1b9a; }

    /* ── Grid ── */
    #grid {
      display: grid;
      gap: clamp(8px, 2vw, 12px);
      padding: 0 14px 30px;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .card-wrapper { perspective: 600px; }

    .card {
      width: 100%;
      aspect-ratio: 0.85;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 18px;
    }

    .card.flipped { transform: rotateY(180deg); }
    .card.matched { cursor: default; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Card back — pink sparkle */
    .card-back {
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      border: 4px solid rgba(255,255,255,0.55);
      box-shadow: 3px 5px 0 rgba(0,0,0,0.18);
      font-size: clamp(1.8rem, 5vw, 3rem);
    }
    .card-back::before { content: '👑'; }

    /* Card front */
    .card-front {
      transform: rotateY(180deg);
      border: 4px solid rgba(255,255,255,0.6);
      box-shadow: 3px 5px 0 rgba(0,0,0,0.12);
      padding: 6px 4px;
      gap: 4px;
    }

    .card-front .princess-emoji {
      font-size: clamp(2.2rem, 6.5vw, 4rem);
      line-height: 1;
    }

    .card-front .princess-name {
      font-size: clamp(0.6rem, 1.8vw, 0.9rem);
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Matched state */
    .card.matched .card-front {
      border-color: #ffd700;
      box-shadow: 0 0 0 4px #ffd700, 3px 5px 0 rgba(0,0,0,0.1);
      animation: matchPop 0.35s ease;
    }
    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.16); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card.wrong .card-front {
      animation: wrongShake 0.42s ease;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      20%     { transform: rotateY(180deg) translateX(-8px); }
      40%     { transform: rotateY(180deg) translateX(8px); }
      60%     { transform: rotateY(180deg) translateX(-6px); }
      80%     { transform: rotateY(180deg) translateX(6px); }
    }

    /* ── Confetti ── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 100;
    }

    /* ── Win screen ── */
    #win-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,240,250,0.93);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #win-screen.show { display: flex; }

    #win-emoji { font-size: clamp(4rem, 14vw, 7rem); animation: bounce 0.65s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

    #win-text {
      font-size: clamp(1.8rem, 5.5vw, 3.2rem);
      color: #880e4f;
      text-align: center;
      text-shadow: 3px 3px 0 #f8bbd0;
    }

    #win-moves { font-size: clamp(1rem, 3vw, 1.5rem); color: #6a1b9a; }

    .win-btn {
      font-family: inherit;
      font-size: clamp(1rem, 3vw, 1.6rem);
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .win-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    #again-btn { background: linear-gradient(135deg, #f06292, #c2185b); }
    #menu-btn  { background: linear-gradient(135deg, #ab47bc, #6a1b9a); }

    .match-flash {
      position: fixed; inset: 0;
      background: rgba(255, 215, 0, 0.28);
      pointer-events: none; z-index: 99;
      animation: flash 0.4s ease forwards;
    }
    @keyframes flash { 0% { opacity:1; } 100% { opacity:0; } }
  </style>
</head>
<body>

<h1>Princess Memory!</h1>

<!-- Mode picker -->
<div id="mode-screen">
  <p>Choose your level, little princess!</p>
  <button class="mode-btn easy" onclick="startGame(10)">
    👑 Easy
    <small>10 cards · 5 princesses</small>
  </button>
  <button class="mode-btn hard" onclick="startGame(20)">
    ✨ Hard
    <small>20 cards · 10 princesses</small>
  </button>
</div>

<!-- Game -->
<div id="game-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="showMenu()">← Menu</button>
    <div id="score-box">
      Pairs: <span id="pairs-count">0</span>/<span id="pairs-total">0</span>
      &nbsp;|&nbsp; Moves: <span id="moves-count">0</span>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ Again</button>
  </div>
  <div id="grid"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div id="win-screen">
  <div id="win-emoji">👑</div>
  <div id="win-text">You found them all!<br>You're a princess! 💖</div>
  <div id="win-moves"></div>
  <button class="win-btn" id="again-btn" onclick="restartGame()">Play Again!</button>
  <button class="win-btn" id="menu-btn"  onclick="showMenu()">Change Level</button>
</div>

<script>
  // Princess data — emoji + themed background gradient
  const ALL_PRINCESSES = [
    { id: 'cinderella', emoji: '👠', label: 'Cinderella', bg: 'linear-gradient(135deg,#90caf9,#1565c0)' },
    { id: 'ariel',      emoji: '🧜‍♀️', label: 'Ariel',      bg: 'linear-gradient(135deg,#80cbc4,#00695c)' },
    { id: 'belle',      emoji: '🌹', label: 'Belle',      bg: 'linear-gradient(135deg,#fff176,#f9a825)' },
    { id: 'elsa',       emoji: '❄️', label: 'Elsa',       bg: 'linear-gradient(135deg,#b3e5fc,#0288d1)' },
    { id: 'moana',      emoji: '🌊', label: 'Moana',      bg: 'linear-gradient(135deg,#80deea,#00838f)' },
    { id: 'rapunzel',   emoji: '🌻', label: 'Rapunzel',   bg: 'linear-gradient(135deg,#ce93d8,#7b1fa2)' },
    { id: 'tiana',      emoji: '🐸', label: 'Tiana',      bg: 'linear-gradient(135deg,#a5d6a7,#2e7d32)' },
    { id: 'snowwhite',  emoji: '🍎', label: 'Snow White', bg: 'linear-gradient(135deg,#ef9a9a,#c62828)' },
    { id: 'jasmine',    emoji: '🌙', label: 'Jasmine',    bg: 'linear-gradient(135deg,#80cbc4,#6a1b9a)' },
    { id: 'aurora',     emoji: '🌸', label: 'Aurora',     bg: 'linear-gradient(135deg,#f48fb1,#ad1457)' },
  ];

  let currentMode  = 10;
  let flipped      = [];
  let locked       = false;
  let matchedPairs = 0;
  let moves        = 0;
  let totalPairs   = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showMenu() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    document.getElementById('mode-screen').style.display = 'flex';
    document.getElementById('game-screen').style.display = 'none';
  }

  function startGame(cardCount) {
    currentMode = cardCount;
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    buildGrid();
  }

  function restartGame() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    buildGrid();
  }

  function buildGrid() {
    flipped      = [];
    locked       = false;
    matchedPairs = 0;
    moves        = 0;
    totalPairs   = currentMode / 2;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    // 5 columns always — looks great on most screens
    grid.style.gridTemplateColumns = 'repeat(5, 1fr)';

    const chosen = shuffle(ALL_PRINCESSES).slice(0, totalPairs);
    const cards  = shuffle([...chosen, ...chosen].map((p, i) => ({ ...p, uid: i })));

    document.getElementById('pairs-total').textContent = totalPairs;
    document.getElementById('pairs-count').textContent = 0;
    document.getElementById('moves-count').textContent = 0;

    cards.forEach(p => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = p.id;

      card.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front" style="background:${p.bg}">
          <span class="princess-emoji">${p.emoji}</span>
          <span class="princess-name">${p.label}</span>
        </div>
      `;

      card.addEventListener('click', () => onCardClick(card));
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
    });
  }

  function onCardClick(card) {
    if (locked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length < 2) return;

    locked = true;
    moves++;
    document.getElementById('moves-count').textContent = moves;

    const [a, b] = flipped;

    if (a.dataset.id === b.dataset.id) {
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        flipped = [];
        locked  = false;
        matchedPairs++;
        document.getElementById('pairs-count').textContent = matchedPairs;
        flashScreen();

        if (matchedPairs === totalPairs) {
          setTimeout(() => {
            document.getElementById('win-moves').textContent = `You used ${moves} moves! 💕`;
            document.getElementById('win-screen').classList.add('show');
            startConfetti();
          }, 550);
        }
      }, 500);
    } else {
      a.classList.add('wrong');
      b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped', 'wrong');
        b.classList.remove('flipped', 'wrong');
        flipped = [];
        locked  = false;
      }, 950);
    }
  }

  function flashScreen() {
    const el = document.createElement('div');
    el.className = 'match-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 450);
  }

  // ── Confetti (pink/gold palette) ──
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [], animFrame = null, running = false;
  const COLORS  = ['#f06292','#ce93d8','#ffd700','#ff80ab','#b39ddb','#f8bbd0','#fff176','#e040fb'];

  function startConfetti() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = Array.from({ length: 160 }, () => ({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 140,
      r: 5 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      dx: (Math.random() - 0.5) * 5,
      dy: 2.5 + Math.random() * 4,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 9,
      heart: Math.random() < 0.3,
    }));
    running = true;
    draw();
  }

  function draw() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.heart) {
        // draw a tiny heart
        ctx.font = `${p.r * 2}px serif`;
        ctx.fillText('♥', -p.r, p.r * 0.5);
      } else {
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.55);
      }
      ctx.restore();
      p.x += p.dx; p.y += p.dy; p.angle += p.spin;
      if (p.y > canvas.height + 30) { p.y = -20; p.x = Math.random() * canvas.width; }
    });
    animFrame = requestAnimationFrame(draw);
  }

  function stopConfetti() {
    running = false;
    cancelAnimationFrame(animFrame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  document.getElementById('mode-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
</script>
</body>
</html>
