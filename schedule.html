<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Happy Puppy Schedule</title>
<style>
  :root {
    --bg: #fdf9f3;
    --card: #ffffff;
    --ink: #2b2233;
    --muted: #7a6f80;
    --border: #ece4d9;
    --accent: #ff7a59;
    --accent-soft: #ffe7df;
    --today: #fff4ec;
    --shadow: 0 8px 24px rgba(40, 30, 50, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-rounded, "Nunito", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }
  header {
    padding: 28px 20px 12px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--card);
    padding: 6px;
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin: 18px auto 22px;
    width: fit-content;
  }
  .tab {
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--accent);
    color: white;
  }
  .person-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 14px auto 20px;
    max-width: 980px;
  }
  .person-pill {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    transition: background 0.15s, color 0.15s, transform 0.15s;
  }
  .person-pill.active {
    color: white;
    transform: translateY(-1px);
  }
  .person-pill.matt { background: #3b82f6; border-color: #3b82f6; }
  .person-pill.wren { background: #ec4899; border-color: #ec4899; }
  .person-pill.chelsea { background: #c4b5fd; border-color: #c4b5fd; }
  .person-pill.all { background: var(--accent); border-color: var(--accent); color: white; }
  .person-pill:hover { background: var(--accent-soft); }
  .ribbon-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .ribbon {
    flex: 1 1 100%;
    padding: 3px 6px;
    border-radius: 999px;
    font-size: 10px;
    color: white;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Calendar */
  .cal-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }
  .cal-controls h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
  }
  .cal-controls .nav { display: flex; gap: 8px; }
  .nav button, .today-btn {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    padding: 8px 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .nav button:hover, .today-btn:hover { background: var(--accent-soft); }
  .grid {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border);
  }
  .dow {
    text-align: center;
    padding: 10px 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: #faf6f0;
    border-bottom: 1px solid var(--border);
  }
  .day {
    min-height: 110px;
    padding: 6px 6px 8px;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    background: var(--card);
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .day:nth-child(7n + 8) { border-left: 0; }
  .day.muted { background: #fbf7f1; color: #b9aebd; }
  .day.today { background: var(--today); }
  .day .dnum {
    font-weight: 700;
    font-size: 13px;
    align-self: flex-end;
    padding: 2px 7px;
    border-radius: 999px;
    color: var(--muted);
  }
  .day.today .dnum {
    background: var(--accent);
    color: white;
  }
  .chip {
    font-size: 11px;
    line-height: 1.25;
    padding: 4px 6px;
    border-radius: 6px;
    color: white;
    font-weight: 600;
    cursor: default;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip .t { font-weight: 500; opacity: 0.85; margin-right: 4px; }

  /* Events list */
  .section-title {
    margin: 18px 0 10px;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 700;
  }
  .ev {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    margin-top: 6px;
    flex: 0 0 auto;
  }
  .ev h3 {
    margin: 0 0 4px;
    font-size: 17px;
  }
  .ev .meta {
    color: var(--muted);
    font-size: 13px;
    margin: 2px 0;
  }
  .ev .meta strong { color: var(--ink); font-weight: 600; }
  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 8px 4px;
  }

  /* Collapsible future-month sections */
  .months-header {
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .jump-controls { display: flex; gap: 8px; }
  .jump-btn {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 999px;
    padding: 6px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .jump-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .future-months { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  details.month-section {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  details.month-section summary {
    padding: 14px 18px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 12px;
    list-style: none;
    background: linear-gradient(180deg, #fff, #fbf6ee);
  }
  details.month-section summary::-webkit-details-marker { display: none; }
  details.month-section summary::before {
    content: "▸";
    font-size: 12px;
    color: var(--accent);
    transition: transform 0.2s;
    display: inline-block;
  }
  details.month-section[open] summary::before { transform: rotate(90deg); }
  details.month-section summary:hover { background: var(--accent-soft); }
  details.month-section .grid {
    border-radius: 0;
    box-shadow: none;
    border: 0;
    border-top: 1px solid var(--border);
  }
  details.month-section summary .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  @media (max-width: 640px) {
    .day { min-height: 78px; padding: 4px; }
    .day .dnum { font-size: 12px; padding: 1px 5px; }
    .chip { font-size: 10px; padding: 2px 4px; }
    header h1 { font-size: 22px; }
    .cal-controls h2 { font-size: 18px; }
    details.month-section summary { padding: 10px 12px; font-size: 14px; }
  }
</style>
</head>

<header>

</header>

  <section class="panel active" id="panel-calendar" role="tabpanel">

        <button id="prev" aria-label="Previous month">‹</button>
        <button id="today">Today</button>
        <button id="next" aria-label="Next month">›</button>
      </div>
      <h2 id="month-label"></h2>
      <div class="nav" aria-hidden="true" style="visibility:hidden">

      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="months-header">
      <div class="section-title" style="margin:0">Browse other months</div>
      <div class="jump-controls">
        <button class="jump-btn" data-jump="2026">Jump to 2026</button>
        <button class="jump-btn" data-jump="2027">Jump to 2027</button>
      </div>
    </div>
    <div class="future-months" id="future-months"></div>

  <section class="panel" id="panel-list" role="tabpanel">

    <div id="recurring"></div>
    <div class="section-title">Travel</div>
    <div id="travel"></div>
    <div class="section-title">One-off events</div>
    <div id="oneoff"></div>

</div>

    selectedPerson === "all" || !ev.owner || ev.owner === selectedPerson;

  // --- Helpers --------------------------------------------------------------
  const ymd = d =>
    `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

  const parseYmd = s => {
    if (!s) return null;
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
  };

  const sameDay = (a, b) =>
    a.getFullYear() === b.getFullYear() &&
    a.getMonth() === b.getMonth() &&
    a.getDate() === b.getDate();

  const rangeIncludes = (date, range) => {
    const start = parseYmd(range.start);
    const end = parseYmd(range.end);
    if (start && date < start) return false;
    if (end && date > end) return false;
    return true;
  };

  const personRangesForDate = date =>
    personRanges.filter(r =>
      (selectedPerson === "all" || r.person === selectedPerson) &&
      rangeIncludes(date, r)
    );

  const setPersonFilter = personId => {
    selectedPerson = personId;
    renderPersonFilters();
    renderCalendar();
    renderOtherMonths();
    renderList();
  };

  const renderPersonFilters = () => {
    const container = document.getElementById("person-filters");
    container.innerHTML = "";
    [
      { id: "all", name: "All", style: "all" },
      ...people
    ].forEach(person => {
      const btn = document.createElement("button");
      btn.className = `person-pill ${person.id}`;
      btn.textContent = person.name;
      if (selectedPerson === person.id) btn.classList.add("active");
      btn.addEventListener("click", () => setPersonFilter(person.id));
      container.appendChild(btn);
    });
  };

  const occursOn = (ev, day) => {
    if (!ev.daysOfWeek.includes(day.getDay())) return false;
    return ev.ranges.some(r => {
      const start = parseYmd(r.start);
      const end = parseYmd(r.end);
      if (start && day < start) return false;
      if (end && day > end) return false;
      return true;
    });
  };

  // --- Calendar render ------------------------------------------------------
  const monthLabel = document.getElementById("month-label");
  const grid = document.getElementById("grid");
  const futureMonthsEl = document.getElementById("future-months");
  const today = new Date();
  let cursor = new Date(today.getFullYear(), today.getMonth(), 1);
  const PAST_MONTH_COUNT = 1;
  const FUTURE_MONTH_COUNT = 17;

  const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];
  const dowShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function renderMonthGrid(gridEl, monthDate) {
    gridEl.innerHTML = "";

    dowShort.forEach(d => {
      const el = document.createElement("div");
      el.className = "dow";
      el.textContent = d;
      gridEl.appendChild(el);
    });

    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();

    for (let i = firstDow - 1; i >= 0; i--) {
      const dnum = daysInPrev - i;
      const day = new Date(year, month - 1, dnum);
      gridEl.appendChild(buildDay(day, true));
    }
    for (let i = 1; i <= daysInMonth; i++) {
      const day = new Date(year, month, i);
      gridEl.appendChild(buildDay(day, false));
    }
    const filled = firstDow + daysInMonth;
    const trailing = (Math.ceil(filled / 7) * 7) - filled;
    for (let i = 1; i <= trailing; i++) {
      const day = new Date(year, month + 1, i);
      gridEl.appendChild(buildDay(day, true));
    }
  }

  function countEventsInMonth(monthDate) {
    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    let count = 0;
    for (let i = 1; i <= daysInMonth; i++) {
      const day = new Date(year, month, i);
      count += personRangesForDate(day).length;
      events.forEach(ev => { if (occursOn(ev, day)) count++; });
      oneOffEvents.forEach(ev => {
        if (sameDay(day, parseYmd(ev.date)) && oneOffVisible(ev)) count++;
      });
    }
    return count;
  }

  function renderCalendar() {
    monthLabel.textContent = `${monthNames[cursor.getMonth()]} ${cursor.getFullYear()}`;
    renderMonthGrid(grid, cursor);
  }

  function renderOtherMonths() {
    const openSet = new Set();
    futureMonthsEl.querySelectorAll("details.month-section[open]").forEach(d => {
      openSet.add(d.dataset.key);
    });
    futureMonthsEl.innerHTML = "";

    for (let i = -PAST_MONTH_COUNT; i <= FUTURE_MONTH_COUNT; i++) {
      if (i === 0) continue;
      const monthDate = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const key = `${monthDate.getFullYear()}-${monthDate.getMonth()}`;

      const details = document.createElement("details");
      details.className = "month-section";
      details.dataset.key = key;
      if (openSet.has(key)) details.open = true;

      const summary = document.createElement("summary");
      const label = document.createElement("span");
      label.textContent = `${monthNames[monthDate.getMonth()]} ${monthDate.getFullYear()}`;
      const count = document.createElement("span");
      count.className = "count";
      const n = countEventsInMonth(monthDate);
      count.textContent = n === 1 ? "1 event" : `${n} events`;
      summary.appendChild(label);
      summary.appendChild(count);
      details.appendChild(summary);

      const monthGrid = document.createElement("div");
      monthGrid.className = "grid";
      details.appendChild(monthGrid);

      details.addEventListener("toggle", () => {
        if (details.open && !monthGrid.dataset.rendered) {
          renderMonthGrid(monthGrid, monthDate);
          monthGrid.dataset.rendered = "1";
        }
      });
      if (details.open) {
        renderMonthGrid(monthGrid, monthDate);
        monthGrid.dataset.rendered = "1";
      }

      futureMonthsEl.appendChild(details);
    }
  }

  function buildDay(date, muted) {
    const cell = document.createElement("div");
    cell.className = "day" + (muted ? " muted" : "") + (sameDay(date, today) ? " today" : "");
    const num = document.createElement("div");
    num.className = "dnum";
    num.textContent = date.getDate();
    cell.appendChild(num);

    const ribbons = personRangesForDate(date);
    if (ribbons.length) {
      const row = document.createElement("div");
      row.className = "ribbon-row";
      ribbons.forEach(r => {
        const person = people.find(p => p.id === r.person) || { name: r.person, color: "#777" };
        const chip = document.createElement("div");
        chip.className = "ribbon";
        chip.style.background = person.color;
        chip.title = `${person.name}: ${r.note}`;
        chip.textContent = r.note || person.name;
        row.appendChild(chip);
      });
      cell.appendChild(row);
    }

    events.forEach(ev => {
      if (occursOn(ev, date)) {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.style.background = ev.color;
        chip.title = `${ev.title} · ${ev.time}${ev.location ? " · " + ev.location : ""}`;
        chip.innerHTML = `<span class="t">${ev.time.replace(/:00 /, " ")}</span>${ev.title}`;
        cell.appendChild(chip);
      }
    });

    oneOffEvents.forEach(ev => {
      if (sameDay(date, parseYmd(ev.date)) && oneOffVisible(ev)) {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.style.background = ev.color || "#475569";
        chip.title = `${ev.title}${ev.time ? " · " + ev.time : ""}${ev.location ? " · " + ev.location : ""}`;
        chip.textContent = (ev.time ? ev.time + " " : "") + ev.title;
        cell.appendChild(chip);
      }
    });

    return cell;
  }

  document.getElementById("prev").addEventListener("click", () => {
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1);
    renderCalendar();
  });
  document.getElementById("next").addEventListener("click", () => {
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    renderCalendar();
  });
  document.getElementById("today").addEventListener("click", () => {
    cursor = new Date(today.getFullYear(), today.getMonth(), 1);
    renderCalendar();
  });

  document.querySelectorAll(".jump-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const year = Number(btn.dataset.jump);
      const targetMonth = year === today.getFullYear() ? 0 : 0;
      const key = `${year}-${targetMonth}`;
      const target = futureMonthsEl.querySelector(`details.month-section[data-key="${key}"]`);
      if (target) {
        target.open = true;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  });

  // --- List render ----------------------------------------------------------
  const fullDow = ["Sundays","Mondays","Tuesdays","Wednesdays","Thursdays","Fridays","Saturdays"];

  function renderList() {
    const recurringEl = document.getElementById("recurring");
    const oneoffEl = document.getElementById("oneoff");

    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const stillActive = endStr => {
      if (!endStr) return true;
      const end = parseYmd(endStr);
      return end >= todayStart;
    };

    recurringEl.innerHTML = "";
    events
      .filter(ev => ev.ranges.some(r => stillActive(r.end)))
      .forEach(ev => {
        const days = ev.daysOfWeek.map(d => fullDow[d]).join(", ");
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${ev.color}"></div>
          <div>
            <h3>${ev.title}</h3>
            <div class="meta"><strong>${days}</strong> at <strong>${ev.time}</strong></div>
            ${ev.location ? `<div class="meta">📍 ${ev.location}</div>` : ""}
            ${ev.note ? `<div class="meta">${ev.note}</div>` : ""}
          </div>`;
        recurringEl.appendChild(card);
      });

    const travelEl = document.getElementById("travel");
    const visibleRanges = personRanges.filter(r =>
      (selectedPerson === "all" || r.person === selectedPerson) && stillActive(r.end)
    );
    travelEl.innerHTML = "";
    if (visibleRanges.length === 0) {
      travelEl.innerHTML = `<div class="empty">No travel ranges configured for this person.</div>`;
    } else {
      visibleRanges.forEach(r => {
        const person = people.find(p => p.id === r.person) || { name: r.person, color: "#777" };
        const start = parseYmd(r.start);
        const end = parseYmd(r.end);
        const dateText = start && end
          ? `${start.toLocaleDateString()} – ${end.toLocaleDateString()}`
          : start
            ? `${start.toLocaleDateString()} onward`
            : end
              ? `Until ${end.toLocaleDateString()}`
              : `Open range`;
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${person.color}"></div>
          <div>
            <h3>${person.name}</h3>
            <div class="meta"><strong>${dateText}</strong></div>
            ${r.note ? `<div class="meta">${r.note}</div>` : ""}
          </div>`;
        travelEl.appendChild(card);
      });
    }

    oneoffEl.innerHTML = "";
    const visibleOneOffs = oneOffEvents
      .filter(oneOffVisible)
      .filter(ev => parseYmd(ev.date) >= todayStart)
      .slice()
      .sort((a, b) => a.date.localeCompare(b.date));
    if (visibleOneOffs.length === 0) {
      oneoffEl.innerHTML = `<div class="empty">No one-off events yet.</div>`;
    } else {
      visibleOneOffs.forEach(ev => {
        const date = parseYmd(ev.date);
        const human = date.toLocaleDateString(undefined, {
          weekday: "long", month: "long", day: "numeric", year: "numeric"
        });
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${ev.color || "#475569"}"></div>
          <div>
            <h3>${ev.title}</h3>
            <div class="meta"><strong>${human}</strong>${ev.time ? " at <strong>" + ev.time + "</strong>" : ""}</div>
            ${ev.location ? `<div class="meta">📍 ${ev.location}</div>` : ""}
            ${ev.note ? `<div class="meta">${ev.note}</div>` : ""}
          </div>`;
        oneoffEl.appendChild(card);
      });
    }
  }

  // --- Tabs -----------------------------------------------------------------
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    });
  });

  renderPersonFilters();
  renderCalendar();
  renderOtherMonths();
  renderList();
</script>
</body>
</html>
