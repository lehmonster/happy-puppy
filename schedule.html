<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Taylor Family Calendar</title>
<style>
  :root {
    --bg: #fdf9f3;
    --card: #ffffff;
    --ink: #2b2233;
    --muted: #7a6f80;
    --border: #ece4d9;
    --accent: #ff7a59;
    --accent-soft: #ffe7df;
    --today: #fff4ec;
    --shadow: 0 8px 24px rgba(40, 30, 50, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-rounded, "Nunito", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }
  header {
    padding: 28px 20px 12px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--card);
    padding: 6px;
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin: 18px auto 22px;
    width: fit-content;
  }
  .tab {
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--accent);
    color: white;
  }
  .person-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 14px auto 20px;
    max-width: 980px;
  }
  .person-pill {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    transition: background 0.15s, color 0.15s, transform 0.15s;
  }
  .person-pill.active {
    color: white;
    transform: translateY(-1px);
  }
  .person-pill.matt { background: #3b82f6; border-color: #3b82f6; }
  .person-pill.wren { background: #ec4899; border-color: #ec4899; }
  .person-pill.chelsea { background: #c4b5fd; border-color: #c4b5fd; }
  .person-pill.vivian { background: #eab308; border-color: #eab308; }
  .person-pill.all { background: var(--accent); border-color: var(--accent); color: white; }
  .person-pill:hover { background: var(--accent-soft); }
  .ribbon-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .ribbon {
    flex: 1 1 100%;
    padding: 3px 6px;
    border-radius: 999px;
    font-size: 10px;
    color: white;
    font-weight: 700;
    text-align: center;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Calendar */
  .cal-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }
  .cal-controls h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
  }
  .cal-controls .nav { display: flex; gap: 8px; }
  .nav button, .today-btn {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    padding: 8px 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .nav button:hover, .today-btn:hover { background: var(--accent-soft); }
  .grid {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border);
  }
  .dow {
    text-align: center;
    padding: 10px 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: #faf6f0;
    border-bottom: 1px solid var(--border);
  }
  .day {
    min-height: 110px;
    padding: 6px 6px 8px;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    background: var(--card);
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    transition: background 0.12s, box-shadow 0.12s;
  }
  .day:nth-child(7n + 8) { border-left: 0; }
  .day.muted { background: #fbf7f1; color: #b9aebd; }
  .day.today { background: var(--today); }
  .day:hover { background: var(--accent-soft); }
  .day.today:hover { background: #ffe0d0; }
  .day .dnum {
    font-weight: 700;
    font-size: 13px;
    align-self: flex-end;
    padding: 2px 7px;
    border-radius: 999px;
    color: var(--muted);
  }
  .day.today .dnum {
    background: var(--accent);
    color: white;
  }
  .chip {
    font-size: 11px;
    line-height: 1.25;
    padding: 4px 6px;
    border-radius: 6px;
    color: white;
    font-weight: 600;
    cursor: inherit;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .chip .t { font-weight: 500; opacity: 0.85; margin-right: 4px; }

  /* Events list */
  .section-title {
    margin: 18px 0 10px;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 700;
  }
  .ev {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    margin-top: 6px;
    flex: 0 0 auto;
  }
  .ev h3 {
    margin: 0 0 4px;
    font-size: 17px;
  }
  .ev .meta {
    color: var(--muted);
    font-size: 13px;
    margin: 2px 0;
  }
  .ev .meta strong { color: var(--ink); font-weight: 600; }
  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 8px 4px;
  }

  /* Collapsible future-month sections */
  .months-header {
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .jump-controls { display: flex; gap: 8px; }
  .jump-btn {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 999px;
    padding: 6px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .jump-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .future-months { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  details.month-section {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  details.month-section summary {
    padding: 14px 18px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 12px;
    list-style: none;
    background: linear-gradient(180deg, #fff, #fbf6ee);
  }
  details.month-section summary::-webkit-details-marker { display: none; }
  details.month-section summary::before {
    content: "▸";
    font-size: 12px;
    color: var(--accent);
    transition: transform 0.2s;
    display: inline-block;
  }
  details.month-section[open] summary::before { transform: rotate(90deg); }
  details.month-section summary:hover { background: var(--accent-soft); }
  details.month-section .grid {
    border-radius: 0;
    box-shadow: none;
    border: 0;
    border-top: 1px solid var(--border);
  }
  details.month-section summary .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  /* Daily-view modal */
  .day-overlay {
    position: fixed;
    inset: 0;
    background: rgba(40, 30, 50, 0.45);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
    z-index: 50;
  }
  .day-overlay.open { display: flex; }
  .day-modal {
    background: var(--card);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(40, 30, 50, 0.25);
    max-width: 620px;
    width: 100%;
    padding: 22px 22px 18px;
    position: relative;
    animation: pop 0.16s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.96); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .day-modal-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .day-modal-header h2 {
    margin: 0;
    font-size: 22px;
    line-height: 1.2;
  }
  .day-modal-header .sub {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }
  .day-modal-close {
    margin-left: auto;
    border: 1px solid var(--border);
    background: var(--card);
    width: 34px;
    height: 34px;
    border-radius: 999px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    color: var(--ink);
    flex: 0 0 auto;
  }
  .day-modal-close:hover { background: var(--accent-soft); border-color: var(--accent); }
  .day-modal-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .day-modal-nav button {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    padding: 7px 12px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .day-modal-nav button:hover { background: var(--accent-soft); border-color: var(--accent); }
  .day-modal .ev { margin-bottom: 8px; }
  .day-modal .section-title { margin: 12px 0 6px; font-size: 13px; }
  .day-modal .empty { padding: 18px 4px; text-align: center; }

  @media (max-width: 640px) {
    .day { min-height: 78px; padding: 4px; }
    .day .dnum { font-size: 12px; padding: 1px 5px; }
    .chip { font-size: 10px; padding: 2px 4px; }
    header h1 { font-size: 22px; }
    .cal-controls h2 { font-size: 18px; }
    details.month-section summary { padding: 10px 12px; font-size: 14px; }
    .day-modal { padding: 18px 16px 14px; }
    .day-modal-header h2 { font-size: 18px; }
  }
</style>
</head>
<body>
<header>
  <h1>Taylor Family Calendar</h1>
  <p>Recurring activities &amp; one-off events</p>
</header>

<div class="wrap">
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="calendar" role="tab">Calendar</button>
    <button class="tab" data-tab="list" role="tab">Events</button>
  </div>

  <div class="person-filters" id="person-filters"></div>

  <section class="panel active" id="panel-calendar" role="tabpanel">
    <div class="cal-controls">
      <div class="nav">
        <button id="prev" aria-label="Previous month">‹</button>
        <button id="today">Today</button>
        <button id="next" aria-label="Next month">›</button>
      </div>
      <h2 id="month-label"></h2>
      <div class="nav" aria-hidden="true" style="visibility:hidden">
        <button>‹</button><button>Today</button><button>›</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="months-header">
      <div class="section-title" style="margin:0">Browse other months</div>
      <div class="jump-controls">
        <button class="jump-btn" data-jump="2026">Jump to 2026</button>
        <button class="jump-btn" data-jump="2027">Jump to 2027</button>
      </div>
    </div>
    <div class="future-months" id="future-months"></div>
  </section>

  <section class="panel" id="panel-list" role="tabpanel">
    <div class="section-title">Recurring</div>
    <div id="recurring"></div>
    <div class="section-title">Travel</div>
    <div id="travel"></div>
    <div class="section-title">One-off events</div>
    <div id="oneoff"></div>
  </section>
</div>

<div class="day-overlay" id="day-overlay" role="dialog" aria-modal="true" aria-labelledby="day-modal-title">
  <div class="day-modal" id="day-modal">
    <div class="day-modal-header">
      <div>
        <h2 id="day-modal-title"></h2>
        <div class="sub" id="day-modal-sub"></div>
      </div>
      <button class="day-modal-close" id="day-modal-close" aria-label="Close">×</button>
    </div>
    <div class="day-modal-nav">
      <button id="day-prev" aria-label="Previous day">‹ Prev</button>
      <button id="day-next" aria-label="Next day">Next ›</button>
    </div>
    <div id="day-modal-body"></div>
  </div>
</div>

  const oneOffEvents = [
    // Matt
    { title: "Dinner",          color: "#3b82f6", date: "2026-05-04", owner: "matt" },
    { title: "Concert",         color: "#3b82f6", date: "2026-05-05", owner: "matt" },
    { title: "Tennis",          color: "#3b82f6", date: "2026-05-11", time: "6:00 PM", owner: "matt" },
    { title: "Scotch Dinner",   color: "#3b82f6", date: "2026-05-14", owner: "matt" },
    { title: "Scotch Play Day", color: "#3b82f6", date: "2026-05-16", time: "2:00 – 5:00 PM", note: "Weekend", owner: "matt" },
    { title: "Tennis",          color: "#3b82f6", date: "2026-05-18", time: "6:00 PM", owner: "matt" },
    { title: "Member Guest",    color: "#3b82f6", date: "2026-05-20", owner: "matt" },
    { title: "Bob's Birthday",  color: "#3b82f6", date: "2026-07-08", owner: "matt" },
    { title: "Last Day (V)",    color: "#3b82f6", date: "2026-08-07", owner: "matt" },
    { title: "Steve",           color: "#3b82f6", date: "2026-08-08", owner: "matt" },
    // Wren – end of 2025–26 school year
    { title: "Memorial Day – school off", color: "#ec4899", date: "2026-05-25", owner: "wren" },
    { title: "Half day (last day)",       color: "#ec4899", date: "2026-05-29", owner: "wren" },
    { title: "Summer break begins",       color: "#ec4899", date: "2026-06-01", owner: "wren" },
    // Wren – 2026–27 MSD school year (official calendar, updated 1/7/26)
    { title: "Family Visit Day",                 color: "#ec4899", date: "2026-08-28", owner: "wren", note: "Refer to your child's schedule" },
    { title: "MSD 101 – New Families",           color: "#ec4899", date: "2026-08-29", owner: "wren", note: "Adults only" },
    { title: "New Student Orientation (½-day)",  color: "#ec4899", date: "2026-08-31", owner: "wren", note: "Toddler Phase-in begins" },
    { title: "First Full Day of School",         color: "#ec4899", date: "2026-09-01", owner: "wren", note: "Primary Phase-in begins" },
    { title: "Labor Day – No School",            color: "#ec4899", date: "2026-09-07", owner: "wren" },
    { title: "Back to School Night",             color: "#ec4899", date: "2026-09-10", owner: "wren", note: "Adults only" },
    { title: "Staff Day – No School",            color: "#ec4899", date: "2026-09-25", owner: "wren" },
    { title: "GrandFriends Day (½-day)",         color: "#ec4899", date: "2026-11-20", owner: "wren" },
    { title: "Colorado Gives Day",               color: "#ec4899", date: "2026-12-08", owner: "wren" },
    { title: "MLK Jr Day – No School",           color: "#ec4899", date: "2027-01-18", owner: "wren" },
    { title: "No School (TODD/PRI/K)",           color: "#ec4899", date: "2027-02-05", owner: "wren" },
    { title: "Staff Day – No School",            color: "#ec4899", date: "2027-05-14", owner: "wren" },
    { title: "Memorial Day – No School",         color: "#ec4899", date: "2027-05-31", owner: "wren" },
    { title: "Last Day of School (½-day)",       color: "#ec4899", date: "2027-06-04", owner: "wren" },
    { title: "Juneteenth – Campus Closed",       color: "#ec4899", date: "2027-06-18", owner: "wren" },
    // Chelsea
    { title: "Tennis", color: "#c4b5fd", date: "2026-04-28", time: "4:00 PM",  owner: "chelsea" },
    { title: "Tennis", color: "#c4b5fd", date: "2026-05-24", time: "11:00 AM", owner: "chelsea" },
    // Everyone (no owner)
    { title: "Silly Jellyfish Brunch", color: "#f97316", date: "2026-05-27", time: "8:45 – 9:45 AM", location: "Rick's" }
  ];

  const oneOffVisible = ev =>
    selectedPerson === "all" || !ev.owner || ev.owner === selectedPerson;

  // --- Helpers --------------------------------------------------------------
  const ymd = d =>
    `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

  const parseYmd = s => {
    if (!s) return null;
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
  };

  const sameDay = (a, b) =>
    a.getFullYear() === b.getFullYear() &&
    a.getMonth() === b.getMonth() &&
    a.getDate() === b.getDate();

  const rangeIncludes = (date, range) => {
    const start = parseYmd(range.start);
    const end = parseYmd(range.end);
    if (start && date < start) return false;
    if (end && date > end) return false;
    return true;
  };

  const personRangesForDate = date =>
    personRanges.filter(r =>
      (selectedPerson === "all" || r.person === selectedPerson) &&
      rangeIncludes(date, r)
    );

  const setPersonFilter = personId => {
    selectedPerson = personId;
    renderPersonFilters();
    renderCalendar();
    renderOtherMonths();
    renderList();
  };

  const renderPersonFilters = () => {
    const container = document.getElementById("person-filters");
    container.innerHTML = "";
    [
      { id: "all", name: "All", style: "all" },
      ...people
    ].forEach(person => {
      const btn = document.createElement("button");
      btn.className = `person-pill ${person.id}`;
      btn.textContent = person.name;
      if (selectedPerson === person.id) btn.classList.add("active");
      btn.addEventListener("click", () => setPersonFilter(person.id));
      container.appendChild(btn);
    });
  };

  const timeToMinutes = timeStr => {
    if (!timeStr) return Infinity;
    const first = timeStr.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?/i);
    if (!first) return Infinity;
    let hour = parseInt(first[1], 10);
    const min = first[2] ? parseInt(first[2], 10) : 0;
    let mer = first[3];
    if (!mer) {
      const m = timeStr.match(/(AM|PM)/i);
      if (m) mer = m[1];
    }
    if (mer) {
      mer = mer.toUpperCase();
      if (mer === "PM" && hour !== 12) hour += 12;
      if (mer === "AM" && hour === 12) hour = 0;
    }
    return hour * 60 + min;
  };

  const occursOn = (ev, day) => {
    if (!ev.daysOfWeek.includes(day.getDay())) return false;
    if (ev.exceptions && ev.exceptions.includes(ymd(day))) return false;
    const inRange = ev.ranges.some(r => {
      const start = parseYmd(r.start);
      const end = parseYmd(r.end);
      if (start && day < start) return false;
      if (end && day > end) return false;
      return true;
    });
    if (!inRange) return false;
    if (ev.intervalWeeks && ev.intervalWeeks > 1) {
      const anchor = parseYmd(ev.ranges[0].start);
      if (!anchor) return true;
      const weeksDiff = Math.round((day - anchor) / (7 * 24 * 60 * 60 * 1000));
      if (weeksDiff < 0 || weeksDiff % ev.intervalWeeks !== 0) return false;
    }
    return true;
  };

  // --- Calendar render ------------------------------------------------------
  const monthLabel = document.getElementById("month-label");
  const grid = document.getElementById("grid");
  const futureMonthsEl = document.getElementById("future-months");
  const today = new Date();
  let cursor = new Date(today.getFullYear(), today.getMonth(), 1);
  const PAST_MONTH_COUNT = 0;
  const FUTURE_MONTH_COUNT = 17;

  const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];
  const dowShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function renderMonthGrid(gridEl, monthDate) {
    gridEl.innerHTML = "";

    dowShort.forEach(d => {
      const el = document.createElement("div");
      el.className = "dow";
      el.textContent = d;
      gridEl.appendChild(el);
    });

    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();

    for (let i = firstDow - 1; i >= 0; i--) {
      const dnum = daysInPrev - i;
      const day = new Date(year, month - 1, dnum);
      gridEl.appendChild(buildDay(day, true));
    }
    for (let i = 1; i <= daysInMonth; i++) {
      const day = new Date(year, month, i);
      gridEl.appendChild(buildDay(day, false));
    }
    const filled = firstDow + daysInMonth;
    const trailing = (Math.ceil(filled / 7) * 7) - filled;
    for (let i = 1; i <= trailing; i++) {
      const day = new Date(year, month + 1, i);
      gridEl.appendChild(buildDay(day, true));
    }
  }

  function countEventsInMonth(monthDate) {
    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    let count = 0;
    for (let i = 1; i <= daysInMonth; i++) {
      const day = new Date(year, month, i);
      count += personRangesForDate(day).length;
      events.forEach(ev => { if (occursOn(ev, day)) count++; });
      oneOffEvents.forEach(ev => {
        if (sameDay(day, parseYmd(ev.date)) && oneOffVisible(ev)) count++;
      });
    }
    return count;
  }

  function renderCalendar() {
    monthLabel.textContent = `${monthNames[cursor.getMonth()]} ${cursor.getFullYear()}`;
    renderMonthGrid(grid, cursor);
  }

  function renderOtherMonths() {
    const openSet = new Set();
    futureMonthsEl.querySelectorAll("details.month-section[open]").forEach(d => {
      openSet.add(d.dataset.key);
    });
    futureMonthsEl.innerHTML = "";

    for (let i = -PAST_MONTH_COUNT; i <= FUTURE_MONTH_COUNT; i++) {
      if (i === 0) continue;
      const monthDate = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const key = `${monthDate.getFullYear()}-${monthDate.getMonth()}`;

      const details = document.createElement("details");
      details.className = "month-section";
      details.dataset.key = key;
      if (openSet.has(key)) details.open = true;

      const summary = document.createElement("summary");
      const label = document.createElement("span");
      label.textContent = `${monthNames[monthDate.getMonth()]} ${monthDate.getFullYear()}`;
      const count = document.createElement("span");
      count.className = "count";
      const n = countEventsInMonth(monthDate);
      count.textContent = n === 1 ? "1 event" : `${n} events`;
      summary.appendChild(label);
      summary.appendChild(count);
      details.appendChild(summary);

      const monthGrid = document.createElement("div");
      monthGrid.className = "grid";
      details.appendChild(monthGrid);

      details.addEventListener("toggle", () => {
        if (details.open && !monthGrid.dataset.rendered) {
          renderMonthGrid(monthGrid, monthDate);
          monthGrid.dataset.rendered = "1";
        }
      });
      if (details.open) {
        renderMonthGrid(monthGrid, monthDate);
        monthGrid.dataset.rendered = "1";
      }

      futureMonthsEl.appendChild(details);
    }
  }

  function buildDay(date, muted) {
    const cell = document.createElement("div");
    cell.className = "day" + (muted ? " muted" : "") + (sameDay(date, today) ? " today" : "");
    cell.addEventListener("click", () => openDay(date));
    const num = document.createElement("div");
    num.className = "dnum";
    num.textContent = date.getDate();
    cell.appendChild(num);

    const ribbons = personRangesForDate(date);
    if (ribbons.length) {
      const row = document.createElement("div");
      row.className = "ribbon-row";
      ribbons.forEach(r => {
        const person = people.find(p => p.id === r.person) || { name: r.person, color: "#777" };
        const chip = document.createElement("div");
        chip.className = "ribbon";
        chip.style.background = person.color;
        chip.title = `${person.name}: ${r.note}`;
        chip.textContent = r.note || person.name;
        row.appendChild(chip);
      });
      cell.appendChild(row);
    }

    const dayItems = [];
    events.forEach(ev => {
      if (occursOn(ev, date)) dayItems.push({ type: "recurring", ev });
    });
    oneOffEvents.forEach(ev => {
      if (sameDay(date, parseYmd(ev.date)) && oneOffVisible(ev)) {
        dayItems.push({ type: "oneoff", ev });
      }
    });
    dayItems.sort((a, b) => timeToMinutes(a.ev.time) - timeToMinutes(b.ev.time));

    dayItems.forEach(({ type, ev }) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.style.background = ev.color || "#475569";
      if (type === "recurring") {
        chip.title = `${ev.title} · ${ev.time}${ev.location ? " · " + ev.location : ""}${ev.address ? " · " + ev.address : ""}`;
        const loc = ev.shortLocation ? ` · ${ev.shortLocation}` : "";
        chip.innerHTML = `<span class="t">${ev.time.replace(/:00 /, " ")}</span>${ev.title}${loc}`;
      } else {
        chip.title = `${ev.title}${ev.time ? " · " + ev.time : ""}${ev.location ? " · " + ev.location : ""}`;
        chip.textContent = (ev.time ? ev.time + " " : "") + ev.title;
      }
      cell.appendChild(chip);
    });

    return cell;
  }

  // --- Daily view modal ----------------------------------------------------
  const dayOverlay = document.getElementById("day-overlay");
  const dayModalTitle = document.getElementById("day-modal-title");
  const dayModalSub = document.getElementById("day-modal-sub");
  const dayModalBody = document.getElementById("day-modal-body");
  let activeDay = null;

  function renderDay(date) {
    activeDay = date;
    dayModalTitle.textContent = date.toLocaleDateString(undefined, {
      weekday: "long", month: "long", day: "numeric", year: "numeric"
    });
    const isToday = sameDay(date, today);
    dayModalSub.textContent = isToday ? "Today" : "";

    dayModalBody.innerHTML = "";

    const ranges = personRangesForDate(date);
    const recurring = events
      .filter(ev => occursOn(ev, date))
      .slice()
      .sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
    const oneOffs = oneOffEvents
      .filter(ev => sameDay(date, parseYmd(ev.date)) && oneOffVisible(ev))
      .slice()
      .sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));

    if (!ranges.length && !recurring.length && !oneOffs.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Nothing scheduled.";
      dayModalBody.appendChild(empty);
      return;
    }

    if (ranges.length) {
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = "Travel / out of town";
      dayModalBody.appendChild(title);
      ranges.forEach(r => {
        const person = people.find(p => p.id === r.person) || { name: r.person, color: "#777" };
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${person.color}"></div>
          <div>
            <h3>${person.name}</h3>
            ${r.note ? `<div class="meta">${r.note}</div>` : ""}
          </div>`;
        dayModalBody.appendChild(card);
      });
    }

    if (recurring.length) {
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = "Recurring";
      dayModalBody.appendChild(title);
      recurring.forEach(ev => {
        const card = document.createElement("div");
        card.className = "ev";
        const addressLink = ev.address
          ? `<div class="meta">📍 ${ev.location ? ev.location + " — " : ""}<a href="${ev.mapLink || ('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(ev.address))}" target="_blank" rel="noopener">${ev.address}</a></div>`
          : (ev.location ? `<div class="meta">📍 ${ev.location}</div>` : "");
        const mapEmbed = ev.mapEmbed
          ? `<div class="meta" style="margin-top:8px"><iframe src="${ev.mapEmbed}" width="100%" height="220" style="border:1px solid var(--border); border-radius:10px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`
          : "";
        card.innerHTML = `
          <div class="swatch" style="background:${ev.color}"></div>
          <div>
            <h3>${ev.title}</h3>
            <div class="meta">at <strong>${ev.time}</strong></div>
            ${addressLink}
            ${ev.note ? `<div class="meta">${ev.note}</div>` : ""}
            ${mapEmbed}
          </div>`;
        dayModalBody.appendChild(card);
      });
    }

    if (oneOffs.length) {
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = "Events";
      dayModalBody.appendChild(title);
      oneOffs.forEach(ev => {
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${ev.color || "#475569"}"></div>
          <div>
            <h3>${ev.title}</h3>
            ${ev.time ? `<div class="meta">at <strong>${ev.time}</strong></div>` : ""}
            ${ev.location ? `<div class="meta">📍 ${ev.location}</div>` : ""}
            ${ev.note ? `<div class="meta">${ev.note}</div>` : ""}
          </div>`;
        dayModalBody.appendChild(card);
      });
    }
  }

  function openDay(date) {
    renderDay(new Date(date.getFullYear(), date.getMonth(), date.getDate()));
    dayOverlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeDay() {
    dayOverlay.classList.remove("open");
    document.body.style.overflow = "";
    activeDay = null;
  }
  function stepDay(delta) {
    if (!activeDay) return;
    const next = new Date(activeDay.getFullYear(), activeDay.getMonth(), activeDay.getDate() + delta);
    renderDay(next);
  }
  document.getElementById("day-modal-close").addEventListener("click", closeDay);
  document.getElementById("day-prev").addEventListener("click", () => stepDay(-1));
  document.getElementById("day-next").addEventListener("click", () => stepDay(1));
  dayOverlay.addEventListener("click", e => {
    if (e.target === dayOverlay) closeDay();
  });
  document.addEventListener("keydown", e => {
    if (!dayOverlay.classList.contains("open")) return;
    if (e.key === "Escape") closeDay();
    else if (e.key === "ArrowLeft") stepDay(-1);
    else if (e.key === "ArrowRight") stepDay(1);
  });

  document.getElementById("prev").addEventListener("click", () => {
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1);
    renderCalendar();
  });
  document.getElementById("next").addEventListener("click", () => {
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    renderCalendar();
  });
  document.getElementById("today").addEventListener("click", () => {
    cursor = new Date(today.getFullYear(), today.getMonth(), 1);
    renderCalendar();
  });

  document.querySelectorAll(".jump-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const year = Number(btn.dataset.jump);
      const targetMonth = year === today.getFullYear() ? 0 : 0;
      const key = `${year}-${targetMonth}`;
      const target = futureMonthsEl.querySelector(`details.month-section[data-key="${key}"]`);
      if (target) {
        target.open = true;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  });

  // --- List render ----------------------------------------------------------
  const fullDow = ["Sundays","Mondays","Tuesdays","Wednesdays","Thursdays","Fridays","Saturdays"];

  function renderList() {
    const recurringEl = document.getElementById("recurring");
    const oneoffEl = document.getElementById("oneoff");

    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const stillActive = endStr => {
      if (!endStr) return true;
      const end = parseYmd(endStr);
      return end >= todayStart;
    };

    recurringEl.innerHTML = "";
    events
      .filter(ev => ev.ranges.some(r => stillActive(r.end)))
      .forEach(ev => {
        const days = ev.daysOfWeek.map(d => fullDow[d]).join(", ");
        const card = document.createElement("div");
        card.className = "ev";
        const addressLink = ev.address
          ? `<div class="meta">📍 ${ev.location ? ev.location + " — " : ""}<a href="${ev.mapLink || ('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(ev.address))}" target="_blank" rel="noopener">${ev.address}</a></div>`
          : (ev.location ? `<div class="meta">📍 ${ev.location}</div>` : "");
        card.innerHTML = `
          <div class="swatch" style="background:${ev.color}"></div>
          <div>
            <h3>${ev.title}</h3>
            <div class="meta"><strong>${days}</strong> at <strong>${ev.time}</strong></div>
            ${addressLink}
            ${ev.note ? `<div class="meta">${ev.note}</div>` : ""}
          </div>`;
        recurringEl.appendChild(card);
      });

    const travelEl = document.getElementById("travel");
    const visibleRanges = personRanges.filter(r =>
      (selectedPerson === "all" || r.person === selectedPerson) && stillActive(r.end)
    );
    travelEl.innerHTML = "";
    if (visibleRanges.length === 0) {
      travelEl.innerHTML = `<div class="empty">No travel ranges configured for this person.</div>`;
    } else {
      visibleRanges.forEach(r => {
        const person = people.find(p => p.id === r.person) || { name: r.person, color: "#777" };
        const start = parseYmd(r.start);
        const end = parseYmd(r.end);
        const dateText = start && end
          ? `${start.toLocaleDateString()} – ${end.toLocaleDateString()}`
          : start
            ? `${start.toLocaleDateString()} onward`
            : end
              ? `Until ${end.toLocaleDateString()}`
              : `Open range`;
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${person.color}"></div>
          <div>
            <h3>${person.name}</h3>
            <div class="meta"><strong>${dateText}</strong></div>
            ${r.note ? `<div class="meta">${r.note}</div>` : ""}
          </div>`;
        travelEl.appendChild(card);
      });
    }

    oneoffEl.innerHTML = "";
    const visibleOneOffs = oneOffEvents
      .filter(oneOffVisible)
      .filter(ev => parseYmd(ev.date) >= todayStart)
      .slice()
      .sort((a, b) => a.date.localeCompare(b.date));
    if (visibleOneOffs.length === 0) {
      oneoffEl.innerHTML = `<div class="empty">No one-off events yet.</div>`;
    } else {
      visibleOneOffs.forEach(ev => {
        const date = parseYmd(ev.date);
        const human = date.toLocaleDateString(undefined, {
          weekday: "long", month: "long", day: "numeric", year: "numeric"
        });
        const card = document.createElement("div");
        card.className = "ev";
        card.innerHTML = `
          <div class="swatch" style="background:${ev.color || "#475569"}"></div>
          <div>
            <h3>${ev.title}</h3>
            <div class="meta"><strong>${human}</strong>${ev.time ? " at <strong>" + ev.time + "</strong>" : ""}</div>
            ${ev.location ? `<div class="meta">📍 ${ev.location}</div>` : ""}
            ${ev.note ? `<div class="meta">${ev.note}</div>` : ""}
          </div>`;
        oneoffEl.appendChild(card);
      });
    }
  }

  // --- Tabs -----------------------------------------------------------------
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    });
  });

  renderPersonFilters();
  renderCalendar();
  renderOtherMonths();
  renderList();
</script>
</body>
</html>
