<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F0C8F0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <title>Princess Memory Match!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Poppins', 'Comic Sans MS', cursive;
      background: #FAF6F0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      color: #6A0DAD;
      padding: 14px 10px 4px;
      letter-spacing: 2px;
    }
    h1::before { content: '✨ '; }
    h1::after  { content: ' ✨'; }

    /* ── Mode picker ── */
    #mode-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 18px 20px 28px;
    }

    #mode-screen p {
      font-size: clamp(1.05rem, 3vw, 1.6rem);
      color: #6A0DAD;
      text-align: center;
    }

    .mode-btn {
      font-family: inherit;
      font-size: clamp(1.05rem, 3.5vw, 1.7rem);
      padding: 16px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 7px 0 rgba(0,0,0,0.20);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      width: clamp(240px, 70vw, 340px);
      text-align: center;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      min-height: 56px;
    }
    .mode-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.20); }
    .mode-btn.easy { background: #E8409A; }
    .mode-btn.hard { background: #6A0DAD; }
    .mode-btn small { display: block; font-size: 0.55em; opacity: 0.9; margin-top: 2px; }

    /* ── Game ── */
    #game-screen { display: none; }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px 8px;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      background: rgba(250, 246, 240, 0.94);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
    }

    #score-box {
      font-size: clamp(0.85rem, 2.4vw, 1.25rem);
      color: #6A0DAD;
      font-weight: bold;
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    #back-btn, #restart-btn {
      font-family: inherit;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      padding: 10px 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 rgba(0,0,0,0.16);
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      min-height: 40px;
      white-space: nowrap;
    }
    #back-btn:active, #restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.16); }
    #back-btn    { background: #F7CADF; color: #8B1A4E; }
    #restart-btn { background: #EDD5F7; color: #6A0DAD; }

    /* ── Grid ── Always 5 columns: easy = 5×2, hard = 5×4. */
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px 8px 28px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }
    @media (min-width: 540px) {
      #grid { gap: 12px; padding: 12px 14px 30px; }
    }

    .card-wrapper { perspective: 600px; }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 16px;
      touch-action: manipulation;
    }

    .card.flipped { transform: rotateY(180deg); }
    .card.matched { cursor: default; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Card back — bold pink with 👑 */
    .card-back {
      background: #C83EC8;
      border: 4px solid rgba(255,255,255,0.55);
      box-shadow: 3px 5px 0 rgba(0,0,0,0.18);
      font-size: clamp(1.6rem, 5vw, 3rem);
    }
    .card-back::before { content: '👑'; }

    /* Card front — princess portrait on top, NAME label on bottom.
       Grid is predictable here: row 1 takes the leftover space for the
       portrait, row 2 is exactly the height of the name strip. */
    .card-front {
      transform: rotateY(180deg);
      background: white;
      border: 4px solid rgba(255,255,255,0.6);
      box-shadow: 3px 5px 0 rgba(0,0,0,0.12);
      padding: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      grid-template-columns: 1fr;
      align-items: stretch;
      justify-items: stretch;
    }

    .card-front .princess-img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: contain;
      object-position: center;
      background: white;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
      padding: 4px 4px 0;
    }

    .card-front .princess-name {
      width: 100%;
      background: #E8409A;
      color: white;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      font-weight: 700;
      text-align: center;
      padding: 6px 3px 7px;
      font-size: clamp(0.62rem, 1.9vw, 1.05rem);
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.22);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    /* Matched state */
    .card.matched .card-front {
      border-color: #ffd700;
      box-shadow: 0 0 0 4px #ffd700, 3px 5px 0 rgba(0,0,0,0.1);
      animation: matchPop 0.35s ease;
    }
    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.16); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card.wrong .card-front {
      animation: wrongShake 0.42s ease;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      20%     { transform: rotateY(180deg) translateX(-8px); }
      40%     { transform: rotateY(180deg) translateX(8px); }
      60%     { transform: rotateY(180deg) translateX(-6px); }
      80%     { transform: rotateY(180deg) translateX(6px); }
    }

    /* ── Confetti ── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 100;
    }

    /* ── Win screen ── */
    #win-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,240,250,0.93);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    #win-screen.show { display: flex; }

    #win-emoji { font-size: clamp(4rem, 14vw, 7rem); animation: bounce 0.65s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

    #win-screen { background: rgba(250, 246, 240, 0.95); }

    #win-text {
      font-size: clamp(1.6rem, 5.5vw, 3.2rem);
      color: #6A0DAD;
      text-align: center;
      line-height: 1.2;
    }

    #win-moves { font-size: clamp(1rem, 3vw, 1.5rem); color: #8B1A4E; text-align: center; }

    .win-btn {
      font-family: inherit;
      font-size: clamp(1rem, 3vw, 1.6rem);
      padding: 14px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      min-height: 54px;
      width: clamp(220px, 70vw, 320px);
    }
    .win-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    #again-btn { background: #E8409A; }
    #menu-btn  { background: #6A0DAD; }

    .match-flash {
      position: fixed; inset: 0;
      background: rgba(255, 215, 0, 0.28);
      pointer-events: none; z-index: 99;
      animation: flash 0.4s ease forwards;
    }
    @keyframes flash { 0% { opacity:1; } 100% { opacity:0; } }
  </style>
</head>
<body>

<h1>Princess Memory!</h1>

<!-- Mode picker -->
<div id="mode-screen">
  <p>Choose your level, little princess!</p>
  <button class="mode-btn easy" onclick="startGame(10)">
    👑 Easy
    <small>10 cards · 5 princesses</small>
  </button>
  <button class="mode-btn hard" onclick="startGame(20)">
    ✨ Hard
    <small>20 cards · 10 princesses</small>
  </button>
</div>

<!-- Game -->
<div id="game-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="showMenu()">← Menu</button>
    <div id="score-box">
      Pairs: <span id="pairs-count">0</span>/<span id="pairs-total">0</span>
      &nbsp;|&nbsp; Moves: <span id="moves-count">0</span>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ Again</button>
  </div>
  <div id="grid"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div id="win-screen">
  <div id="win-emoji">👑</div>
  <div id="win-text">You found them all!<br>You're a princess! 💖</div>
  <div id="win-moves"></div>
  <button class="win-btn" id="again-btn" onclick="restartGame()">Play Again!</button>
  <button class="win-btn" id="menu-btn"  onclick="showMenu()">Change Level</button>
</div>

<script>
  /* Princess key — Disney Emoji Blitz portraits matching the printed key.
     Labels are shown UPPERCASE under each card via .princess-name CSS. */
  const ALL_PRINCESSES = [
    { id: 'snowwhite',  label: 'Snow White', img: 'princesses/snowwhite.jpg' },
    { id: 'cinderella', label: 'Cinderella', img: 'princesses/cinderella.jpg' },
    { id: 'elsa',       label: 'Elsa',       img: 'princesses/elsa.jpg' },
    { id: 'tinkerbell', label: 'Tinkerbell', img: 'princesses/tinkerbell.jpg' },
    { id: 'ariel',      label: 'Ariel',      img: 'princesses/ariel.jpg' },
    { id: 'belle',      label: 'Belle',      img: 'princesses/belle.jpg' },
    { id: 'jasmine',    label: 'Jasmine',    img: 'princesses/jasmine.jpg' },
    { id: 'mulan',      label: 'Mulan',      img: 'princesses/mulan.jpg' },
    { id: 'tiana',      label: 'Tiana',      img: 'princesses/tiana.jpg' },
    { id: 'rapunzel',   label: 'Rapunzel',   img: 'princesses/rapunzel.jpg' },
    { id: 'merida',     label: 'Brave',      img: 'princesses/merida.jpg' },
    { id: 'moana',      label: 'Moana',      img: 'princesses/moana.jpg' },
  ];

  /* Preload images so the first flip is instant on iPhone */
  ALL_PRINCESSES.forEach(p => { const i = new Image(); i.src = p.img; });

  let currentMode  = 10;
  let flipped      = [];
  let locked       = false;
  let matchedPairs = 0;
  let moves        = 0;
  let totalPairs   = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showMenu() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    document.getElementById('mode-screen').style.display = 'flex';
    document.getElementById('game-screen').style.display = 'none';
  }

  function startGame(cardCount) {
    currentMode = cardCount;
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    buildGrid();
  }

  function restartGame() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    buildGrid();
  }

  function buildGrid() {
    flipped      = [];
    locked       = false;
    matchedPairs = 0;
    moves        = 0;
    totalPairs   = currentMode / 2;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const chosen = shuffle(ALL_PRINCESSES).slice(0, totalPairs);
    const cards  = shuffle([...chosen, ...chosen].map((p, i) => ({ ...p, uid: i })));

    document.getElementById('pairs-total').textContent = totalPairs;
    document.getElementById('pairs-count').textContent = 0;
    document.getElementById('moves-count').textContent = 0;

    cards.forEach(p => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = p.id;

      card.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front">
          <img class="princess-img" src="${p.img}" alt="${p.label}" loading="eager" draggable="false">
          <div class="princess-name">${p.label}</div>
        </div>
      `;

      card.addEventListener('click', () => onCardClick(card));
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
    });
  }

  function onCardClick(card) {
    if (locked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length < 2) return;

    locked = true;
    moves++;
    document.getElementById('moves-count').textContent = moves;

    const [a, b] = flipped;

    if (a.dataset.id === b.dataset.id) {
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        flipped = [];
        locked  = false;
        matchedPairs++;
        document.getElementById('pairs-count').textContent = matchedPairs;
        flashScreen();

        if (matchedPairs === totalPairs) {
          setTimeout(() => {
            document.getElementById('win-moves').textContent = `You used ${moves} moves! 💕`;
            document.getElementById('win-screen').classList.add('show');
            startConfetti();
          }, 550);
        }
      }, 500);
    } else {
      a.classList.add('wrong');
      b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped', 'wrong');
        b.classList.remove('flipped', 'wrong');
        flipped = [];
        locked  = false;
      }, 950);
    }
  }

  function flashScreen() {
    const el = document.createElement('div');
    el.className = 'match-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 450);
  }

  // ── Confetti (pink/gold palette) ──
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [], animFrame = null, running = false;
  const COLORS  = ['#f06292','#ce93d8','#ffd700','#ff80ab','#b39ddb','#f8bbd0','#fff176','#e040fb'];

  function sizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function startConfetti() {
    sizeCanvas();
    const w = window.innerWidth, h = window.innerHeight;
    particles = Array.from({ length: 140 }, () => ({
      x: Math.random() * w,
      y: -20 - Math.random() * 140,
      r: 5 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      dx: (Math.random() - 0.5) * 5,
      dy: 2.5 + Math.random() * 4,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 9,
      heart: Math.random() < 0.3,
    }));
    running = true;
    draw();
  }

  function draw() {
    if (!running) return;
    const w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.heart) {
        ctx.font = `${p.r * 2}px serif`;
        ctx.fillText('♥', -p.r, p.r * 0.5);
      } else {
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.55);
      }
      ctx.restore();
      p.x += p.dx; p.y += p.dy; p.angle += p.spin;
      if (p.y > h + 30) { p.y = -20; p.x = Math.random() * w; }
    });
    animFrame = requestAnimationFrame(draw);
  }

  function stopConfetti() {
    running = false;
    cancelAnimationFrame(animFrame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  window.addEventListener('resize', () => { if (running) sizeCanvas(); });

  document.getElementById('mode-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
</script>
</body>
</html>
