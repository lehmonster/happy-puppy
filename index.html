        // Simple Bar Chart Component using SVG
        function SimpleBarChart({ data }) {
          const maxValue = Math.max(...data.map(d => d.count));
          const chartHeight = 180;
          const barWidth = 100 / (data.length * 1.5);
          
          return (
            <svg width="100%" height={chartHeight} style={{ background: "#130810" }} viewBox="0 0 500 180">
              {data.map((d, i) => {
                const barHeight = (d.count / maxValue) * (chartHeight - 40);
                const x = i * 70 + 30;
                const y = chartHeight - barHeight - 20;
                
                return (
                  <g key={i}>
                    <rect x={x} y={y} width="45" height={barHeight} fill={d.color} rx="4" />
                    <text x={x + 22.5} y={chartHeight - 5} textAnchor="middle" fontSize="12" fill="#7a5060" fontWeight="700">{d.year}</text>
                    <text x={x + 22.5} y={y - 5} textAnchor="middle" fontSize="11" fill="#d4a0c0">{d.count}</text>
                  </g>
                );
              })}
            </svg>
          );
        }

        function SimplePieChart({ data }) {
          const total = data.reduce((sum, d) => sum + d.value, 0);
          let currentAngle = -90;
          const radius = 50;
          const cx = 70;
          const cy = 70;
          
          return (
            <svg width="100%" height="140" viewBox="0 0 140 140" style={{ background: "#130810" }}>
              {data.map((d, i) => {
                const sliceAngle = (d.value / total) * 360;
                const startAngle = currentAngle;
                const endAngle = currentAngle + sliceAngle;
                
                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;
                
                const x1 = cx + radius * Math.cos(startRad);
                const y1 = cy + radius * Math.sin(startRad);
                const x2 = cx + radius * Math.cos(endRad);
                const y2 = cy + radius * Math.sin(endRad);
                
                const largeArc = sliceAngle > 180 ? 1 : 0;
                
                const path = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
                
                currentAngle = endAngle;
                
                return <path key={i} d={path} fill={d.color} stroke="none" />;
              })}
            </svg>
          );
        }

                          <div style={{ fontFamily: "Lato, sans-serif", fontSize: 12, color: "#7a5a8a", background: `${t.color}10`, borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${t.color}55`, lineHeight: 1.6 }}>📝 {t.note}</div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        // ─── ROOT APP ────────────────────────────────────────────────────────────────

        const TABS = [
          { id: "stats", label: "📊 Overview", subtitle: "Charts & Data" },
          { id: "themes", label: "🎭 By Theme", subtitle: "7 Genres" },
        ];

        function App() {
          const [activeTab, setActiveTab] = useState("stats");

          return (
            <div style={{ fontFamily: "Georgia, serif" }}>
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap');
                * { box-sizing: border-box; margin: 0; padding: 0; }
                body { font-family: Georgia, serif; }
              `}</style>

              {/* SHARED HEADER */}
              <div style={{ background: "linear-gradient(135deg, #1c0a14 0%, #2a0d24 50%, #1a0a2e 100%)", padding: "1.5rem 2rem 0", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: -60, right: -60, width: 200, height: 200, borderRadius: "50%", background: "radial-gradient(circle, rgba(139,26,74,0.15), transparent 70%)", pointerEvents: "none" }} />
                <div style={{ maxWidth: 900, margin: "0 auto" }}>
                  <p style={{ fontFamily: "Lato, sans-serif", fontSize: 10, letterSpacing: 4, textTransform: "uppercase", color: "#9a6080", marginBottom: 6 }}>Chelsea Taylor · Reading Life</p>
                  <h1 style={{ fontFamily: "'Playfair Display', serif", fontStyle: "italic", fontSize: "clamp(24px, 5vw, 38px)", fontWeight: 700, color: "#f0d8ff", marginBottom: "1.5rem" }}>
                    412 Books &amp; Counting
                  </h1>

                  {/* TAB BAR */}
                  <div style={{ display: "flex", gap: 4 }}>
                    {TABS.map((tab) => {
                      const isActive = activeTab === tab.id;
                      return (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ padding: "10px 20px", borderRadius: "10px 10px 0 0", border: "none", background: isActive ? "#0c0810" : "transparent", color: isActive ? "#f0e8f4" : "#7a5080", cursor: "pointer", fontFamily: "Lato, sans-serif", fontWeight: 700, fontSize: "clamp(11px, 2vw, 14px)", letterSpacing: 0.5, transition: "all 0.2s", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                          <span>{tab.label}</span>
                          <span style={{ fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.6, fontWeight: 400 }}>{tab.subtitle}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* TAB CONTENT */}
              {activeTab === "stats" && <VisualDashboard />}
              {activeTab === "themes" && <LiteraryThemes />}
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
