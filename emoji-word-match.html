<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji & Word Match!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(135deg, #fff3e0 0%, #fce4ec 50%, #e1f5fe 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      color: #6a1b9a;
      padding: 18px 10px 4px;
      text-shadow: 3px 3px 0 #fff9c4;
      letter-spacing: 1px;
    }

    .tagline {
      text-align: center;
      color: #e65100;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      margin-bottom: 8px;
    }

    /* ── Mode picker ── */
    #mode-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    #mode-screen p {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: #1565c0;
      text-align: center;
    }

    .mode-btn {
      font-family: inherit;
      font-size: clamp(1.1rem, 3.5vw, 1.8rem);
      padding: 18px 44px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 7px 0 rgba(0,0,0,0.22);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      width: clamp(240px, 60vw, 340px);
      text-align: center;
    }
    .mode-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.22); }
    .mode-btn.easy { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
    .mode-btn.hard { background: linear-gradient(135deg, #ef5350, #c62828); }
    .mode-btn small { display: block; font-size: 0.55em; opacity: 0.9; margin-top: 2px; }

    /* ── Game area ── */
    #game-screen { display: none; }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px 10px;
      flex-wrap: wrap;
      gap: 8px;
    }

    #score-box {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      color: #4a148c;
      font-weight: bold;
    }

    #back-btn, #restart-btn {
      font-family: inherit;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      padding: 8px 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #back-btn:active, #restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
    #back-btn    { background: #fff3e0; color: #e65100; }
    #restart-btn { background: #e8f5e9; color: #2e7d32; }

    /* ── Grid ── */
    #grid {
      display: grid;
      gap: clamp(8px, 2vw, 12px);
      padding: 0 14px 30px;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .card-wrapper { perspective: 600px; }

    .card {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 18px;
    }

    .card.flipped { transform: rotateY(180deg); }
    .card.matched { cursor: default; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    /* Card back — two tones so kids can see a pattern, not strictly needed for play */
    .card-back {
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      border: 4px solid rgba(255,255,255,0.5);
      box-shadow: 3px 5px 0 rgba(0,0,0,0.18);
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: white;
    }
    .card-back::before { content: '❔'; }

    /* Emoji card front */
    .card-front {
      transform: rotateY(180deg);
      border: 4px solid #ddd;
      box-shadow: 3px 5px 0 rgba(0,0,0,0.12);
    }
    .card-front.emoji {
      background: linear-gradient(135deg, #fff9c4, #ffe082);
      border-color: #ffb300;
      font-size: clamp(2.2rem, 8vw, 4.5rem);
    }
    .card-front.word {
      background: linear-gradient(135deg, #b3e5fc, #81d4fa);
      border-color: #0288d1;
      font-size: clamp(1rem, 3.8vw, 1.9rem);
      font-weight: bold;
      color: #0d47a1;
      text-transform: lowercase;
      letter-spacing: 2px;
    }

    /* Matched state */
    .card.matched .card-front {
      background: linear-gradient(135deg, #c8e6c9, #81c784) !important;
      border-color: #2e7d32 !important;
      box-shadow: 0 0 0 4px #66bb6a, 3px 5px 0 rgba(0,0,0,0.1);
      animation: matchPop 0.35s ease;
    }
    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.18); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card.wrong .card-front {
      animation: wrongShake 0.42s ease;
      border-color: #ef5350 !important;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      20%     { transform: rotateY(180deg) translateX(-8px); }
      40%     { transform: rotateY(180deg) translateX(8px); }
      60%     { transform: rotateY(180deg) translateX(-6px); }
      80%     { transform: rotateY(180deg) translateX(6px); }
    }

    /* ── Confetti ── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 100;
    }

    /* ── Win screen ── */
    #win-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.93);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #win-screen.show { display: flex; }

    #win-emoji { font-size: clamp(4rem, 14vw, 7rem); animation: bounce 0.65s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

    #win-text {
      font-size: clamp(1.8rem, 5.5vw, 3.2rem);
      color: #4a148c;
      text-align: center;
      text-shadow: 3px 3px 0 #fff9c4;
    }

    #win-moves { font-size: clamp(1rem, 3vw, 1.5rem); color: #1b5e20; }

    .win-btn {
      font-family: inherit;
      font-size: clamp(1rem, 3vw, 1.6rem);
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .win-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    #again-btn { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
    #menu-btn  { background: linear-gradient(135deg, #42a5f5, #1565c0); }

    .match-flash {
      position: fixed; inset: 0;
      background: rgba(255, 230, 0, 0.3);
      pointer-events: none; z-index: 99;
      animation: flash 0.4s ease forwards;
    }
    @keyframes flash { 0% { opacity:1; } 100% { opacity:0; } }
  </style>
</head>
<body>

<h1>🧠 Emoji & Word Match!</h1>
<div class="tagline">Flip a picture. Flip the word that matches. 💛💙</div>

<!-- Mode picker -->
<div id="mode-screen">
  <p>Choose your level:</p>
  <button class="mode-btn easy" onclick="startGame(5)">
    ⭐ Easy
    <small>10 cards · 5 pairs</small>
  </button>
  <button class="mode-btn hard" onclick="startGame(10)">
    🔥 Hard
    <small>20 cards · 10 pairs</small>
  </button>
</div>

<!-- Game -->
<div id="game-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="showMenu()">← Menu</button>
    <div id="score-box">
      Pairs: <span id="pairs-count">0</span>/<span id="pairs-total">0</span>
      &nbsp;|&nbsp; Moves: <span id="moves-count">0</span>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ Again</button>
  </div>
  <div id="grid"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div id="win-screen">
  <div id="win-emoji">🎉</div>
  <div id="win-text">You did it!<br>Amazing reader! 🌟</div>
  <div id="win-moves"></div>
  <button class="win-btn" id="again-btn" onclick="restartGame()">Play Again!</button>
  <button class="win-btn" id="menu-btn"  onclick="showMenu()">Change Level</button>
</div>

<script>
  /* Each item becomes TWO cards: one emoji, one word. The match
     succeeds when the two flipped cards share the same id. */
  const ALL_ITEMS = [
    { id: 'apple',      emoji: '🍎', word: 'apple' },
    { id: 'banana',     emoji: '🍌', word: 'banana' },
    { id: 'grapes',     emoji: '🍇', word: 'grapes' },
    { id: 'orange',     emoji: '🍊', word: 'orange' },
    { id: 'watermelon', emoji: '🍉', word: 'melon' },
    { id: 'cat',        emoji: '🐱', word: 'cat' },
    { id: 'dog',        emoji: '🐶', word: 'dog' },
    { id: 'fish',       emoji: '🐟', word: 'fish' },
    { id: 'frog',       emoji: '🐸', word: 'frog' },
    { id: 'bee',        emoji: '🐝', word: 'bee' },
    { id: 'sun',        emoji: '☀️', word: 'sun' },
    { id: 'star',       emoji: '⭐', word: 'star' },
    { id: 'tree',       emoji: '🌳', word: 'tree' },
    { id: 'flower',     emoji: '🌸', word: 'flower' },
    { id: 'cake',       emoji: '🎂', word: 'cake' },
    { id: 'ball',       emoji: '⚽', word: 'ball' },
    { id: 'hat',        emoji: '🎩', word: 'hat' },
    { id: 'book',       emoji: '📚', word: 'book' },
  ];

  let pairCount    = 5;
  let flipped      = [];
  let locked       = false;
  let matchedPairs = 0;
  let moves        = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showMenu() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    document.getElementById('mode-screen').style.display = 'flex';
    document.getElementById('game-screen').style.display = 'none';
  }

  function startGame(pairs) {
    pairCount = pairs;
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    buildGrid();
  }

  function restartGame() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    buildGrid();
  }

  function buildGrid() {
    flipped      = [];
    locked       = false;
    matchedPairs = 0;
    moves        = 0;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = 'repeat(5, 1fr)';

    const chosen = shuffle(ALL_ITEMS).slice(0, pairCount);
    /* For each item we make one emoji card and one word card. */
    const cards = shuffle(chosen.flatMap(item => [
      { ...item, kind: 'emoji' },
      { ...item, kind: 'word'  },
    ]));

    document.getElementById('pairs-total').textContent = pairCount;
    document.getElementById('pairs-count').textContent = 0;
    document.getElementById('moves-count').textContent = 0;

    cards.forEach(c => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = c.id;

      const content = c.kind === 'emoji' ? c.emoji : c.word;
      card.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front ${c.kind}">${content}</div>
      `;

      card.addEventListener('click', () => onCardClick(card));
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
    });
  }

  function onCardClick(card) {
    if (locked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length < 2) return;

    locked = true;
    moves++;
    document.getElementById('moves-count').textContent = moves;

    const [a, b] = flipped;

    if (a.dataset.id === b.dataset.id) {
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        flipped = [];
        locked  = false;
        matchedPairs++;
        document.getElementById('pairs-count').textContent = matchedPairs;
        flashScreen();

        if (matchedPairs === pairCount) {
          setTimeout(() => {
            document.getElementById('win-moves').textContent = `You used ${moves} moves! 💕`;
            document.getElementById('win-screen').classList.add('show');
            startConfetti();
          }, 550);
        }
      }, 500);
    } else {
      a.classList.add('wrong');
      b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped', 'wrong');
        b.classList.remove('flipped', 'wrong');
        flipped = [];
        locked  = false;
      }, 950);
    }
  }

  function flashScreen() {
    const el = document.createElement('div');
    el.className = 'match-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 450);
  }

  /* ── Confetti ── */
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [], animFrame = null, running = false;
  const COLORS  = ['#e53935','#fdd835','#3949ab','#fb8c00','#8e24aa','#43a047','#ff4081','#00bcd4'];

  function startConfetti() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = Array.from({ length: 150 }, () => ({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 120,
      r: 6 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      dx: (Math.random() - 0.5) * 5,
      dy: 3 + Math.random() * 4,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 9,
    }));
    running = true;
    draw();
  }

  function draw() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.55);
      ctx.restore();
      p.x += p.dx; p.y += p.dy; p.angle += p.spin;
      if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
    });
    animFrame = requestAnimationFrame(draw);
  }

  function stopConfetti() {
    running = false;
    cancelAnimationFrame(animFrame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  document.getElementById('mode-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
</script>
</body>
</html>
