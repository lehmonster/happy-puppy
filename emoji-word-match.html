<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fff3e0">
  <title>Emoji & Word Match!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(135deg, #fff3e0 0%, #fce4ec 50%, #e1f5fe 100%);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      color: #6a1b9a;
      padding: 14px 10px 4px;
      text-shadow: 3px 3px 0 #fff9c4;
      letter-spacing: 1px;
    }

    .tagline {
      text-align: center;
      color: #e65100;
      font-size: clamp(0.85rem, 2.5vw, 1.2rem);
      margin-bottom: 8px;
    }

    /* ── Mode picker ── */
    #mode-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 18px 20px 28px;
    }

    #mode-screen p {
      font-size: clamp(1.05rem, 3vw, 1.6rem);
      color: #1565c0;
      text-align: center;
    }

    .mode-btn {
      font-family: inherit;
      font-size: clamp(1.05rem, 3.5vw, 1.7rem);
      padding: 16px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 7px 0 rgba(0,0,0,0.22);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      width: clamp(240px, 70vw, 340px);
      text-align: center;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      min-height: 56px;
    }
    .mode-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.22); }
    .mode-btn.easy { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
    .mode-btn.hard { background: linear-gradient(135deg, #ef5350, #c62828); }
    .mode-btn small { display: block; font-size: 0.55em; opacity: 0.9; margin-top: 2px; }

    /* ── Game area ── */
    #game-screen { display: none; }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      background: rgba(255, 243, 224, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
    }

    #score-box {
      font-size: clamp(0.85rem, 2.4vw, 1.25rem);
      color: #4a148c;
      font-weight: bold;
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    #back-btn, #restart-btn {
      font-family: inherit;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      padding: 10px 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      min-height: 40px;
      white-space: nowrap;
    }
    #back-btn:active, #restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
    #back-btn    { background: #fff3e0; color: #e65100; }
    #restart-btn { background: #e8f5e9; color: #2e7d32; }

    /* ── Grid ── Always 5 columns: easy = 5×2, hard = 5×4. */
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px 8px 28px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }
    @media (min-width: 540px) {
      #grid { gap: 12px; padding: 12px 14px 30px; }
    }

    .card-wrapper { perspective: 600px; }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 16px;
      touch-action: manipulation;
    }

    .card.flipped { transform: rotateY(180deg); }
    .card.matched { cursor: default; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      overflow: hidden;
    }

    /* Card back */
    .card-back {
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      border: 4px solid rgba(255,255,255,0.5);
      box-shadow: 3px 5px 0 rgba(0,0,0,0.18);
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: white;
    }
    .card-back::before { content: '❔'; }

    /* Emoji card front */
    .card-front {
      transform: rotateY(180deg);
      border: 4px solid #ddd;
      box-shadow: 3px 5px 0 rgba(0,0,0,0.12);
      text-align: center;
      line-height: 1.05;
    }
    .card-front.emoji {
      background: linear-gradient(135deg, #fff9c4, #ffe082);
      border-color: #ffb300;
      font-size: clamp(1.8rem, 7vw, 4rem);
    }
    .card-front.word {
      background: linear-gradient(135deg, #b3e5fc, #81d4fa);
      border-color: #0288d1;
      font-size: clamp(0.85rem, 3.5vw, 1.7rem);
      font-weight: bold;
      color: #0d47a1;
      text-transform: uppercase;
      letter-spacing: 1px;
      word-break: break-word;
    }

    /* Matched state */
    .card.matched .card-front {
      background: linear-gradient(135deg, #c8e6c9, #81c784) !important;
      border-color: #2e7d32 !important;
      box-shadow: 0 0 0 4px #66bb6a, 3px 5px 0 rgba(0,0,0,0.1);
      animation: matchPop 0.35s ease;
    }
    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.18); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card.wrong .card-front {
      animation: wrongShake 0.42s ease;
      border-color: #ef5350 !important;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      20%     { transform: rotateY(180deg) translateX(-8px); }
      40%     { transform: rotateY(180deg) translateX(8px); }
      60%     { transform: rotateY(180deg) translateX(-6px); }
      80%     { transform: rotateY(180deg) translateX(6px); }
    }

    /* ── Confetti ── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 100;
    }

    /* ── Win screen ── */
    #win-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.93);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    #win-screen.show { display: flex; }

    #win-emoji { font-size: clamp(4rem, 14vw, 7rem); animation: bounce 0.65s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

    #win-text {
      font-size: clamp(1.6rem, 5.5vw, 3.2rem);
      color: #4a148c;
      text-align: center;
      text-shadow: 3px 3px 0 #fff9c4;
      line-height: 1.2;
    }

    #win-moves { font-size: clamp(1rem, 3vw, 1.5rem); color: #1b5e20; text-align: center; }

    .win-btn {
      font-family: inherit;
      font-size: clamp(1rem, 3vw, 1.6rem);
      padding: 14px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      min-height: 54px;
      width: clamp(220px, 70vw, 320px);
    }
    .win-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    #again-btn { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
    #menu-btn  { background: linear-gradient(135deg, #42a5f5, #1565c0); }

    .match-flash {
      position: fixed; inset: 0;
      background: rgba(255, 230, 0, 0.3);
      pointer-events: none; z-index: 99;
      animation: flash 0.4s ease forwards;
    }
    @keyframes flash { 0% { opacity:1; } 100% { opacity:0; } }

    /* Home button (visible on mode screen) */
    .home-btn {
      position: fixed; top: 12px; left: 12px;
      background: white; border: 3px solid #ffb84d;
      border-radius: 50%; width: 48px; height: 48px;
      font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; text-decoration: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      touch-action: manipulation;
    }
    .home-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>

<a class="home-btn" href="games.html" aria-label="Back to all games" id="home-link">🏠</a>

<h1>🧠 Emoji & Word Match!</h1>
<div class="tagline">Flip a picture. Flip the word that matches. 💛💙</div>

<!-- Mode picker -->
<div id="mode-screen">
  <p>Choose your level:</p>
  <button class="mode-btn easy" onclick="startGame(5)">
    ⭐ Easy
    <small>10 cards · 5 pairs</small>
  </button>
  <button class="mode-btn hard" onclick="startGame(10)">
    🔥 Hard
    <small>20 cards · 10 pairs</small>
  </button>
</div>

<!-- Game -->
<div id="game-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="showMenu()">← Menu</button>
    <div id="score-box">
      Pairs: <span id="pairs-count">0</span>/<span id="pairs-total">0</span>
      &nbsp;|&nbsp; Moves: <span id="moves-count">0</span>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ Again</button>
  </div>
  <div id="grid"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div id="win-screen">
  <div id="win-emoji">🎉</div>
  <div id="win-text">You did it!<br>Amazing reader! 🌟</div>
  <div id="win-moves"></div>
  <button class="win-btn" id="again-btn" onclick="restartGame()">Play Again!</button>
  <button class="win-btn" id="menu-btn"  onclick="showMenu()">Change Level</button>
</div>

<script>
  /* Each item becomes TWO cards: one emoji, one word. The match
     succeeds when the two flipped cards share the same id. */
  /* All words 4 letters or less — beginner-reader friendly. */
  const ALL_ITEMS = [
    { id: 'cat',  emoji: '🐱', word: 'cat'  },
    { id: 'dog',  emoji: '🐶', word: 'dog'  },
    { id: 'pig',  emoji: '🐷', word: 'pig'  },
    { id: 'cow',  emoji: '🐮', word: 'cow'  },
    { id: 'fox',  emoji: '🦊', word: 'fox'  },
    { id: 'bee',  emoji: '🐝', word: 'bee'  },
    { id: 'bug',  emoji: '🐛', word: 'bug'  },
    { id: 'fish', emoji: '🐟', word: 'fish' },
    { id: 'frog', emoji: '🐸', word: 'frog' },
    { id: 'duck', emoji: '🦆', word: 'duck' },
    { id: 'bird', emoji: '🐦', word: 'bird' },
    { id: 'bear', emoji: '🐻', word: 'bear' },
    { id: 'lion', emoji: '🦁', word: 'lion' },
    { id: 'sun',  emoji: '☀️', word: 'sun'  },
    { id: 'moon', emoji: '🌙', word: 'moon' },
    { id: 'star', emoji: '⭐', word: 'star' },
    { id: 'tree', emoji: '🌳', word: 'tree' },
    { id: 'cake', emoji: '🎂', word: 'cake' },
    { id: 'pie',  emoji: '🥧', word: 'pie'  },
    { id: 'egg',  emoji: '🥚', word: 'egg'  },
    { id: 'cup',  emoji: '🥤', word: 'cup'  },
    { id: 'ball', emoji: '⚽', word: 'ball' },
    { id: 'hat',  emoji: '🎩', word: 'hat'  },
    { id: 'book', emoji: '📚', word: 'book' },
    { id: 'car',  emoji: '🚗', word: 'car'  },
    { id: 'bus',  emoji: '🚌', word: 'bus'  },
    { id: 'key',  emoji: '🔑', word: 'key'  },
    { id: 'bed',  emoji: '🛏️', word: 'bed'  },
  ];

  let pairCount    = 5;
  let flipped      = [];
  let locked       = false;
  let matchedPairs = 0;
  let moves        = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showMenu() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    document.getElementById('mode-screen').style.display = 'flex';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('home-link').style.display = 'flex';
  }

  function startGame(pairs) {
    pairCount = pairs;
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('home-link').style.display = 'none';
    buildGrid();
  }

  function restartGame() {
    stopConfetti();
    document.getElementById('win-screen').classList.remove('show');
    buildGrid();
  }

  function buildGrid() {
    flipped      = [];
    locked       = false;
    matchedPairs = 0;
    moves        = 0;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const chosen = shuffle(ALL_ITEMS).slice(0, pairCount);
    /* For each item we make one emoji card and one word card. */
    const cards = shuffle(chosen.flatMap(item => [
      { ...item, kind: 'emoji' },
      { ...item, kind: 'word'  },
    ]));

    document.getElementById('pairs-total').textContent = pairCount;
    document.getElementById('pairs-count').textContent = 0;
    document.getElementById('moves-count').textContent = 0;

    cards.forEach(c => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = c.id;

      const content = c.kind === 'emoji' ? c.emoji : c.word;
      card.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front ${c.kind}">${content}</div>
      `;

      card.addEventListener('click', () => onCardClick(card));
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
    });
  }

  function onCardClick(card) {
    if (locked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length < 2) return;

    locked = true;
    moves++;
    document.getElementById('moves-count').textContent = moves;

    const [a, b] = flipped;

    /* Hold both cards face-up for 3s so a beginner reader can study them. */
    const HOLD_MS = 3000;

    if (a.dataset.id === b.dataset.id) {
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        flipped = [];
        locked  = false;
        matchedPairs++;
        document.getElementById('pairs-count').textContent = matchedPairs;
        flashScreen();

        if (matchedPairs === pairCount) {
          setTimeout(() => {
            document.getElementById('win-moves').textContent = `You used ${moves} moves! 💕`;
            document.getElementById('win-screen').classList.add('show');
            startConfetti();
          }, 550);
        }
      }, HOLD_MS);
    } else {
      a.classList.add('wrong');
      b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped', 'wrong');
        b.classList.remove('flipped', 'wrong');
        flipped = [];
        locked  = false;
      }, HOLD_MS);
    }
  }

  function flashScreen() {
    const el = document.createElement('div');
    el.className = 'match-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 450);
  }

  /* ── Confetti ── */
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [], animFrame = null, running = false;
  const COLORS  = ['#e53935','#fdd835','#3949ab','#fb8c00','#8e24aa','#43a047','#ff4081','#00bcd4'];

  function sizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function startConfetti() {
    sizeCanvas();
    const w = window.innerWidth;
    particles = Array.from({ length: 140 }, () => ({
      x: Math.random() * w,
      y: -20 - Math.random() * 120,
      r: 6 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      dx: (Math.random() - 0.5) * 5,
      dy: 3 + Math.random() * 4,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 9,
    }));
    running = true;
    draw();
  }

  function draw() {
    if (!running) return;
    const w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.55);
      ctx.restore();
      p.x += p.dx; p.y += p.dy; p.angle += p.spin;
      if (p.y > h + 20) { p.y = -20; p.x = Math.random() * w; }
    });
    animFrame = requestAnimationFrame(draw);
  }

  function stopConfetti() {
    running = false;
    cancelAnimationFrame(animFrame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  window.addEventListener('resize', () => { if (running) sizeCanvas(); });

  document.getElementById('mode-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
</script>
</body>
</html>
