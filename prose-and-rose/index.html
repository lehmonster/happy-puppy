        // Real cover art with multiple fallbacks including Goodreads-style URLs
        function CoverImg({ src: srcProp, isbn, coverId, title, author }) {
          const [currentSrc, setCurrentSrc] = useState(null);
          const [attemptIndex, setAttemptIndex] = useState(0);
          const [failed, setFailed] = useState(false);

          // Clean ISBN (remove dashes)
          const cleanIsbn = isbn ? isbn.replace(/-/g, '') : null;
          const isbn10 = cleanIsbn && cleanIsbn.length === 13 ? cleanIsbn.slice(3) : cleanIsbn;

          // Build fallback chain: direct src, Open Library variants, Google Books, then styled fallback
          const fallbackSources = [
            srcProp,
            coverId && `https://covers.openlibrary.org/b/id/${coverId}-L.jpg?default=false`,
            cleanIsbn && `https://covers.openlibrary.org/b/isbn/${cleanIsbn}-L.jpg?default=false`,
            isbn10 && `https://covers.openlibrary.org/b/isbn/${isbn10}-L.jpg?default=false`,
            cleanIsbn && `https://books.google.com/books/content?id=&printsec=frontcover&img=1&zoom=1&isbn=${cleanIsbn}`,
          ].filter(Boolean);

          React.useEffect(() => {
            if (attemptIndex < fallbackSources.length) {
              setCurrentSrc(fallbackSources[attemptIndex]);
            } else {
              setFailed(true);
            }
          }, [attemptIndex]);

          const handleError = () => {
            if (attemptIndex < fallbackSources.length - 1) {
              setAttemptIndex(attemptIndex + 1);
            } else {
              setFailed(true);
            }
          };

          return (
            <div style={{ width: "100%", height: "100%", background: "linear-gradient(180deg, #1a0a14 0%, #2a0d24 100%)", position: "relative", overflow: "hidden" }}>
              {!failed && currentSrc && (
                <img
                  src={currentSrc}
                  alt={`${title} cover`}
                  loading="lazy"
                  onError={handleError}
                  style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
                />
              )}
              {failed && (
                <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", padding: "0 12px", textAlign: "center" }}>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 14, fontWeight: 700, color: "#f5e0e0", lineHeight: 1.25, marginBottom: 8 }}>{title}</div>
                  <div style={{ fontFamily: "Lato, sans-serif", fontSize: 9, letterSpacing: 2, color: "#a08090", textTransform: "uppercase" }}>{author}</div>
                </div>
              )}
            </div>
          );
        }

        // ─── SIMPLE CHARTS ───────────────────────────────────────────────────────────

        function SimpleBarChart({ data }) {
          const maxValue = Math.max(...data.map(d => d.count));
          const chartHeight = 180;
          
          return (
            <svg width="100%" height={chartHeight} viewBox="0 0 500 180">
              {data.map((d, i) => {
                const barHeight = (d.count / maxValue) * (chartHeight - 40);
                const x = i * 70 + 30;
                const y = chartHeight - barHeight - 20;
                
                return (
                  <g key={i}>
                    <rect x={x} y={y} width="45" height={barHeight} fill={d.color} rx="4" />
                    <text x={x + 22.5} y={chartHeight - 5} textAnchor="middle" fontSize="12" fill="#7a5060" fontWeight="700">{d.year}</text>
                    <text x={x + 22.5} y={y - 5} textAnchor="middle" fontSize="11" fill="#d4a0c0">{d.count}</text>
                  </g>
                );
              })}
            </svg>
          );
        }

        function SimplePieChart({ data }) {
          const total = data.reduce((sum, d) => sum + d.value, 0);
          let currentAngle = -90;
          const radius = 50;
          const cx = 70;
          const cy = 70;
          
          return (
            <svg width="100%" height="140" viewBox="0 0 140 140">
              {data.map((d, i) => {
                const sliceAngle = (d.value / total) * 360;
                const startAngle = currentAngle;
                const endAngle = currentAngle + sliceAngle;
                
                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;
                
                const x1 = cx + radius * Math.cos(startRad);
                const y1 = cy + radius * Math.sin(startRad);
                const x2 = cx + radius * Math.cos(endRad);
                const y2 = cy + radius * Math.sin(endRad);
                
                const largeArc = sliceAngle > 180 ? 1 : 0;
                const path = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
                
                currentAngle = endAngle;
                
                return <path key={i} d={path} fill={d.color} stroke="none" />;
              })}
            </svg>
          );
        }

                <div style={{ marginBottom: 24, textAlign: "center" }}>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: "clamp(20px, 4vw, 36px) clamp(12px, 3vw, 24px)", alignItems: "start" }}>
                  {TBR_BY_THEME[activeTheme].map((book, i) => {
                    const rotation = (i * 1.3 - 2) % 3; // Random-ish rotation per book
                    return (
                    <div key={book.id} onMouseEnter={() => setHoveredIdx(book.id)} onMouseLeave={() => setHoveredIdx(null)} style={{ transform: hoveredIdx === book.id ? "rotate(0deg) translateY(-6px) scale(1.04)" : `rotate(${rotation}deg)`, zIndex: hoveredIdx === book.id ? 10 : 1, position: "relative", transition: "transform 0.25s ease" }}>
                      <div style={{ width: "100%", paddingBottom: "155%", position: "relative", borderRadius: "3px 4px 4px 3px", overflow: "hidden", boxShadow: hoveredIdx === book.id ? "6px 8px 30px rgba(0,0,0,0.5), inset -3px 0 10px rgba(0,0,0,0.3)" : "4px 5px 18px rgba(0,0,0,0.35), inset -2px 0 7px rgba(0,0,0,0.2)" }}>

                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(12px, 2.5vw, 14px)", fontWeight: 700, color: "#1c0a14", lineHeight: 1.25, marginBottom: 3, marginTop: 10 }}>{book.title}</div>
                      <div style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#5A6B7C", marginBottom: 8 }}>{book.author}</div>

                      {/* Star rating */}
                      <div style={{ display: "flex", gap: 3, marginBottom: 5 }}>
                        {[1, 2, 3, 4, 5].map((star) => (
                          <span

                      {hoveredIdx === book.id && (
                        <div style={{ fontFamily: "'Playfair Display', serif", fontStyle: "italic", fontSize: 12, color: "#4a2030", lineHeight: 1.55, borderTop: `2px solid ${themeInfo[activeTheme].color}`, paddingTop: 6 }}>{book.hook}</div>
                      )}
                    </div>

                  })}
                </div>
                <div style={{ marginTop: 40, padding: "20px 24px", background: `${themeInfo[activeTheme].color}15`, borderRadius: 12, borderLeft: `4px solid ${themeInfo[activeTheme].color}` }}>
                  {activeTheme === "everygirl" ? (
                    <>
                      <p style={{ fontFamily: "Lato, sans-serif", fontSize: 12, color: "#4a2030", lineHeight: 1.65, margin: "0 0 8px" }}>

                      </p>
                      <p style={{ fontFamily: "'Playfair Display', serif", fontStyle: "italic", fontSize: 13, color: "#5a3050", lineHeight: 1.6, margin: 0 }}>

                      </p>

                  ) : (
                    <>
                      <p style={{ fontFamily: "Lato, sans-serif", fontSize: 12, color: "#4a2030", lineHeight: 1.65, margin: "0 0 8px" }}>

                      </p>
                      <p style={{ fontFamily: "'Playfair Display', serif", fontStyle: "italic", fontSize: 13, color: "#5a3050", lineHeight: 1.6, margin: 0 }}>
                        Picks pulled from <a href="https://www.beachreadsandbubbly.com/reviews" target="_blank" rel="noopener" style={{ color: themeInfo[activeTheme].color, textDecoration: "underline" }}>beachreadsandbubbly.com</a> (4★+ only), <a href="https://www.goodhousekeeping.com/uk/lifestyle/editors-choice-book-reviews/a71587001/good-books-august-26-collection/" target="_blank" rel="noopener" style={{ color: themeInfo[activeTheme].color, textDecoration: "underline" }}>GH August 2026 collection</a>, and <a href="https://www.buzzfeed.com/meganeliscomb/best-books-read-in-2026-so-far" target="_blank" rel="noopener" style={{ color: themeInfo[activeTheme].color, textDecoration: "underline" }}>BuzzFeed 2026 best-of</a> — all matched to your taste profile and filtered against your reading history.
                      </p>
                    </>
                  )}
                </div>
              </div>
            </div>
          );
        }

        // ─── RECENTLY READ + BLOG ────────────────────────────────────────────────────

        const EMPTY_BOOK = { id: "", title: "", author: "", dateFinished: "", rating: 0, review: "" };

        const DEFAULT_RECENT = [
          { id: "d1", title: "Both Can Be True", author: "Jessica Guerrieri", dateFinished: "", rating: 0, review: "" },
          { id: "d2", title: "The Things We Never Say", author: "Elizabeth Strout", dateFinished: "", rating: 0, review: "" },
          { id: "d3", title: "Fair Play", author: "Louise Hegarty", dateFinished: "", rating: 0, review: "" },
          { id: "d4", title: "The Night We Met", author: "Abby Jimenez", dateFinished: "", rating: 0, review: "" },
          { id: "d5", title: "Audition", author: "Katie Kitamura", dateFinished: "", rating: 0, review: "" },
          { id: "d6", title: "And Now Back to You", author: "BK Borrison", dateFinished: "", rating: 0, review: "" },
          { id: "d7", title: "To Bless the Space Between Us", author: "John O'Donohue", dateFinished: "", rating: 0, review: "" },
          { id: "d8", title: "The Wedding People", author: "Allison Espach", dateFinished: "", rating: 0, review: "" },
          { id: "d9", title: "One Last Stop", author: "Casey McQuiston", dateFinished: "", rating: 0, review: "" },

        ];

        function StarPicker({ value, onChange }) {
          const [hovered, setHovered] = React.useState(null);
          return (
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <span style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#9a7090", marginRight: 4 }}>Rating:</span>
              {[1,2,3,4,5].map(star => (
                <span
                  key={star}
                  onMouseEnter={() => setHovered(star)}
                  onMouseLeave={() => setHovered(null)}
                  onClick={() => onChange(value === star ? 0 : star)}
                  style={{ fontSize: 22, cursor: "pointer", color: (hovered != null ? star <= hovered : star <= value) ? "#FCCA59" : "#e0cfd8", transition: "color 0.15s", lineHeight: 1 }}
                >★</span>
              ))}
              {value > 0 && (
                <span style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#FCCA59", marginLeft: 4 }}>{value}/5</span>
              )}
            </div>
          );
        }

        function RecentlyRead() {
          const storageKey = "recentlyRead_v1";
          const loadBooks = () => {
            try { const saved = JSON.parse(localStorage.getItem(storageKey)); return saved && saved.length ? saved : DEFAULT_RECENT; } catch { return DEFAULT_RECENT; }
          };
          const [books, setBooks] = React.useState(loadBooks);
          const [editingId, setEditingId] = React.useState(null);
          const [draft, setDraft] = React.useState(null);
          const [blogOpen, setBlogOpen] = React.useState(null);
          const [addingNew, setAddingNew] = React.useState(false);
          const [newBook, setNewBook] = React.useState({ title: "", author: "", dateFinished: "", rating: 0 });

          const save = (updated) => {
            setBooks(updated);
            localStorage.setItem(storageKey, JSON.stringify(updated));
          };

          const removeBook = (id) => save(books.filter(b => b.id !== id));

          const startEdit = (book) => {
            setEditingId(book.id);
            setDraft({ ...book });
            setBlogOpen(null);
          };

          const saveEdit = () => {
            save(books.map(b => b.id === editingId ? { ...draft } : b));
            setEditingId(null);
            setDraft(null);
          };

          const saveReview = (id, text) => {
            save(books.map(b => b.id === id ? { ...b, review: text } : b));
          };

          const addBook = () => {
            if (!newBook.title.trim()) return;
            const entry = { ...newBook, id: Date.now().toString(), review: "" };
            const updated = [entry, ...books].slice(0, 10);
            save(updated);
            setNewBook({ title: "", author: "", dateFinished: "", rating: 0 });
            setAddingNew(false);
          };

          const inputStyle = { fontFamily: "Lato, sans-serif", fontSize: 13, padding: "6px 10px", border: "1.5px solid #e8d0e0", borderRadius: 6, outline: "none", width: "100%", boxSizing: "border-box", background: "#fff" };

          return (
            <div style={{ background: "#FEFDFB", minHeight: "80vh", fontFamily: "Georgia, serif" }}>
              <div style={{ maxWidth: 860, margin: "0 auto", padding: "2rem 1rem 3rem" }}>

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
                  <div>
                    <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, color: "#2C3E50", margin: 0 }}>Recently Read</h2>
                    <p style={{ fontFamily: "Lato, sans-serif", fontSize: 13, color: "#7a8a9a", margin: "4px 0 0" }}>Your last 10 books — rate them, review them, remember them</p>
                  </div>
                  {!addingNew && (
                    <button onClick={() => setAddingNew(true)} style={{ padding: "10px 20px", background: "#F296BD", color: "#fff", border: "none", borderRadius: 8, fontFamily: "Lato, sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                      + Add Book
                    </button>
                  )}
                </div>

                {addingNew && (
                  <div style={{ background: "#fff", border: "2px solid #F296BD", borderRadius: 14, padding: 20, marginBottom: 20 }}>
                    <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#2C3E50", marginBottom: 14 }}>Add a book you just finished</h3>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                      <div>
                        <label style={{ fontFamily: "Lato, sans-serif", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#9a7090", display: "block", marginBottom: 4 }}>Title *</label>
                        <input style={inputStyle} value={newBook.title} onChange={e => setNewBook(b => ({ ...b, title: e.target.value }))} placeholder="Book title" />
                      </div>
                      <div>
                        <label style={{ fontFamily: "Lato, sans-serif", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#9a7090", display: "block", marginBottom: 4 }}>Author</label>
                        <input style={inputStyle} value={newBook.author} onChange={e => setNewBook(b => ({ ...b, author: e.target.value }))} placeholder="Author name" />
                      </div>
                      <div>
                        <label style={{ fontFamily: "Lato, sans-serif", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#9a7090", display: "block", marginBottom: 4 }}>Date finished</label>
                        <input type="date" style={inputStyle} value={newBook.dateFinished} onChange={e => setNewBook(b => ({ ...b, dateFinished: e.target.value }))} />
                      </div>
                      <div style={{ display: "flex", alignItems: "flex-end", paddingBottom: 4 }}>
                        <StarPicker value={newBook.rating} onChange={r => setNewBook(b => ({ ...b, rating: r }))} />
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={addBook} style={{ padding: "8px 18px", background: "#F296BD", color: "#fff", border: "none", borderRadius: 7, fontFamily: "Lato, sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Save</button>
                      <button onClick={() => setAddingNew(false)} style={{ padding: "8px 18px", background: "transparent", color: "#9a7090", border: "1.5px solid #e8d0e0", borderRadius: 7, fontFamily: "Lato, sans-serif", fontSize: 13, cursor: "pointer" }}>Cancel</button>
                    </div>
                  </div>
                )}

                {books.length === 0 && !addingNew && (
                  <div style={{ textAlign: "center", padding: "60px 20px", background: "#fff", borderRadius: 14, border: "1.5px solid #f0e0ea" }}>
                    <div style={{ fontSize: 48, marginBottom: 12 }}>📖</div>
                    <p style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, color: "#9a7090", fontStyle: "italic" }}>No books yet — add the first one above</p>
                  </div>
                )}

                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  {books.map((book, idx) => {
                    const isEditing = editingId === book.id;
                    const isBlogOpen = blogOpen === book.id;
                    return (
                      <div key={book.id} style={{ background: "#fff", borderRadius: 14, border: "1.5px solid #f0e0ea", overflow: "hidden", boxShadow: "0 2px 10px rgba(242,150,189,0.07)" }}>
                        <div style={{ padding: "18px 20px" }}>
                          <div style={{ display: "flex", alignItems: "flex-start", gap: 14, flexWrap: "wrap" }}>
                            <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#F296BD22", border: "1.5px solid #F296BD55", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Lato, sans-serif", fontSize: 11, fontWeight: 700, color: "#F296BD", flexShrink: 0 }}>{idx + 1}</div>
                            <div style={{ flex: 1, minWidth: 200 }}>
                              {isEditing ? (
                                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                  <input style={inputStyle} value={draft.title} onChange={e => setDraft(d => ({ ...d, title: e.target.value }))} placeholder="Title" />
                                  <input style={inputStyle} value={draft.author} onChange={e => setDraft(d => ({ ...d, author: e.target.value }))} placeholder="Author" />
                                  <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                                    <input type="date" style={{ ...inputStyle, width: "auto" }} value={draft.dateFinished} onChange={e => setDraft(d => ({ ...d, dateFinished: e.target.value }))} />
                                    <StarPicker value={draft.rating} onChange={r => setDraft(d => ({ ...d, rating: r }))} />
                                  </div>
                                  <div style={{ display: "flex", gap: 8 }}>
                                    <button onClick={saveEdit} style={{ padding: "7px 16px", background: "#F296BD", color: "#fff", border: "none", borderRadius: 6, fontFamily: "Lato, sans-serif", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Save</button>
                                    <button onClick={() => setEditingId(null)} style={{ padding: "7px 14px", background: "transparent", color: "#9a7090", border: "1.5px solid #e8d0e0", borderRadius: 6, fontFamily: "Lato, sans-serif", fontSize: 12, cursor: "pointer" }}>Cancel</button>
                                  </div>
                                </div>
                              ) : (
                                <>
                                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#2C3E50", marginBottom: 3 }}>{book.title || <span style={{ color: "#ccc", fontStyle: "italic" }}>Untitled</span>}</div>
                                  {book.author && <div style={{ fontFamily: "Lato, sans-serif", fontSize: 13, color: "#7a8a9a", marginBottom: 6 }}>{book.author}</div>}
                                  <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                                    <div style={{ display: "flex", gap: 2 }}>
                                      {[1,2,3,4,5].map(s => <span key={s} style={{ fontSize: 16, color: s <= book.rating ? "#FCCA59" : "#e0cfd8" }}>★</span>)}
                                    </div>
                                    {book.dateFinished && <span style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#aaa", letterSpacing: 0.5 }}>finished {new Date(book.dateFinished + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span>}
                                    {book.review && <span style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#F296BD", letterSpacing: 0.5 }}>has review</span>}
                                  </div>
                                </>
                              )}
                            </div>
                            {!isEditing && (
                              <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                                <button onClick={() => setBlogOpen(isBlogOpen ? null : book.id)} style={{ padding: "6px 12px", background: isBlogOpen ? "#F5793B" : "transparent", color: isBlogOpen ? "#fff" : "#F5793B", border: "1.5px solid #F5793B", borderRadius: 6, fontFamily: "Lato, sans-serif", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                                  {book.review ? "Edit Review" : "Write Review"}
                                </button>
                                <button onClick={() => startEdit(book)} style={{ padding: "6px 10px", background: "transparent", color: "#9a7090", border: "1.5px solid #e8d0e0", borderRadius: 6, fontFamily: "Lato, sans-serif", fontSize: 11, cursor: "pointer" }}>Edit</button>
                                <button onClick={() => removeBook(book.id)} style={{ padding: "6px 10px", background: "transparent", color: "#d08090", border: "1.5px solid #f0d0d8", borderRadius: 6, fontFamily: "Lato, sans-serif", fontSize: 11, cursor: "pointer" }}>Remove</button>
                              </div>
                            )}
                          </div>
                        </div>

                        {isBlogOpen && (
                          <BlogEditor
                            book={book}
                            onSave={(text) => { saveReview(book.id, text); setBlogOpen(null); }}
                            onClose={() => setBlogOpen(null)}
                          />
                        )}
                      </div>
                    );
                  })}
                </div>

                {books.length > 0 && (
                  <div style={{ marginTop: 32, padding: "16px 20px", background: "#F296BD10", borderRadius: 10, borderLeft: "3px solid #F296BD" }}>
                    <p style={{ fontFamily: "Lato, sans-serif", fontSize: 12, color: "#6a3050", margin: 0 }}>
                      Ratings and reviews are saved to your browser. Up to 10 books shown — adding a new one when you are at 10 drops the oldest.
                    </p>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function BlogEditor({ book, onSave, onClose }) {
          const [text, setText] = React.useState(book.review || "");
          const [preview, setPreview] = React.useState(false);
          const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;

          return (
            <div style={{ borderTop: "1.5px solid #f0e0ea", background: "#fffbfe", padding: "20px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
                <div>
                  <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: "#F5793B" }}>
                    {book.review ? "Edit Review" : "Write a Review"}
                  </span>
                  <span style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#aaa", marginLeft: 10 }}>
                    {book.title}
                  </span>
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontFamily: "Lato, sans-serif", fontSize: 11, color: "#bbb" }}>{wordCount} words</span>
                  <button onClick={() => setPreview(!preview)} style={{ padding: "5px 12px", background: preview ? "#F5793B" : "transparent", color: preview ? "#fff" : "#F5793B", border: "1.5px solid #F5793B", borderRadius: 6, fontFamily: "Lato, sans-serif", fontSize: 11, cursor: "pointer" }}>
                    {preview ? "Edit" : "Preview"}
                  </button>
                </div>
              </div>

              {preview ? (
                <div style={{ minHeight: 140, padding: "14px 16px", background: "#fff", border: "1.5px solid #f0e0ea", borderRadius: 8, fontFamily: "Georgia, serif", fontSize: 14, color: "#2C3E50", lineHeight: 1.75, whiteSpace: "pre-wrap" }}>
                  {text || <span style={{ color: "#ccc", fontStyle: "italic" }}>Nothing written yet...</span>}
                </div>
              ) : (
                <textarea
                  value={text}
                  onChange={e => setText(e.target.value)}
                  placeholder={"What did you think? Write as much or as little as you want — a quick reaction, a full review, or just the line that stuck with you."}
                  style={{ width: "100%", minHeight: 140, padding: "12px 14px", fontFamily: "Georgia, serif", fontSize: 14, color: "#2C3E50", lineHeight: 1.75, border: "1.5px solid #f0e0ea", borderRadius: 8, outline: "none", resize: "vertical", boxSizing: "border-box", background: "#fff" }}
                />
              )}

              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button onClick={() => onSave(text)} style={{ padding: "8px 20px", background: "#F5793B", color: "#fff", border: "none", borderRadius: 7, fontFamily: "Lato, sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Save Review</button>
                {text && <button onClick={() => onSave("")} style={{ padding: "8px 14px", background: "transparent", color: "#d08090", border: "1.5px solid #f0d0d8", borderRadius: 7, fontFamily: "Lato, sans-serif", fontSize: 12, cursor: "pointer" }}>Clear</button>}
                <button onClick={onClose} style={{ padding: "8px 14px", background: "transparent", color: "#9a7090", border: "1.5px solid #e8d0e0", borderRadius: 7, fontFamily: "Lato, sans-serif", fontSize: 12, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          );
        }

        // ─── ROOT APP ────────────────────────────────────────────────────────────────

        const TABS = [
          { id: "stats", label: "📊 Overview", subtitle: "Charts & Data" },
          { id: "themes", label: "🎭 By Theme", subtitle: "7 Genres" },
          { id: "history", label: "✅ Books Read", subtitle: "420 Complete" },
          { id: "tbr", label: "📚 TBR Pile", subtitle: "20 + 20 Picks" },
          { id: "recent", label: "⭐ Recently Read", subtitle: "Ratings & Reviews" },
        ];

        function App() {
          const [activeTab, setActiveTab] = useState("stats");

          return (
            <div style={{ fontFamily: "Georgia, serif" }}>
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap');
                * { box-sizing: border-box; margin: 0; padding: 0; }
                body { font-family: Georgia, serif; }
              `}</style>

              <div style={{ background: "linear-gradient(135deg, #fef5fb 0%, #fff8f5 25%, #fffef8 50%, #f5fbff 75%, #f8f5ff 100%)", padding: "0.75rem 1rem 0", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: -30, right: -30, width: 120, height: 120, borderRadius: "50%", background: "radial-gradient(circle, rgba(242,150,189,0.15), transparent 70%)", pointerEvents: "none" }} />
                <div style={{ position: "absolute", bottom: -40, left: -40, width: 140, height: 140, borderRadius: "50%", background: "radial-gradient(circle, rgba(153,183,245,0.12), transparent 70%)", pointerEvents: "none" }} />
                <div style={{ position: "absolute", top: 20, left: 20, fontSize: 28, opacity: 0.2, color: "#F296BD" }}>✨</div>
                <div style={{ position: "absolute", bottom: 10, right: 60, fontSize: 20, opacity: 0.2, color: "#99B7F5" }}>📖</div>
                <div style={{ position: "absolute", top: 35, right: 100, fontSize: 16, opacity: 0.15, color: "#F5793B" }}>💕</div>
                <div style={{ maxWidth: 900, margin: "0 auto", textAlign: "center" }}>
                  <h1 style={{ fontFamily: "'Playfair Display', serif", fontStyle: "italic", fontSize: "clamp(24px, 5vw, 36px)", fontWeight: 600, color: "#F296BD", marginBottom: "0.5rem", lineHeight: 1.2, display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                    <span style={{ fontSize: "clamp(20px, 4vw, 28px)", color: "#F5793B" }}>✷</span>
                    <span>Prose &amp; Rosé</span>
                    <span style={{ fontSize: "clamp(20px, 4vw, 28px)", color: "#F5793B" }}>✷</span>
                  </h1>
                  <p style={{ fontFamily: "Lato, sans-serif", fontSize: "clamp(13px, 2.5vw, 16px)", fontStyle: "italic", color: "#267F53", marginBottom: 6, fontWeight: 400 }}>Looking at life with rosé colored reading glasses</p>
                  <p style={{ fontFamily: "Lato, sans-serif", fontSize: "clamp(10px, 2vw, 12px)", letterSpacing: 1.5, color: "#99B7F5", marginBottom: 8, fontWeight: 400 }}>420 books &amp; counting</p>

                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap", overflowX: "auto" }}>
                    {TABS.map((tab) => {
                      const isActive = activeTab === tab.id;
                      return (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ padding: "10px 20px", borderRadius: "10px 10px 0 0", border: "none", background: isActive ? (["tbr","recent"].includes(tab.id) ? "#f5f0e8" : "#0c0810") : "transparent", color: isActive ? (["tbr","recent"].includes(tab.id) ? "#1c0a14" : "#f0e8f4") : "#7a5080", cursor: "pointer", fontFamily: "Lato, sans-serif", fontWeight: 700, fontSize: "clamp(11px, 2vw, 14px)", letterSpacing: 0.5, transition: "all 0.2s", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0 }}>
                          <span>{tab.label}</span>
                          <span style={{ fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.6, fontWeight: 400 }}>{tab.subtitle}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>

              {activeTab === "stats" && <VisualDashboard />}
              {activeTab === "themes" && <LiteraryThemes />}
              {activeTab === "history" && <HistoricalList />}
              {activeTab === "tbr" && <TBRPile />}
              {activeTab === "recent" && <RecentlyRead />}
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
